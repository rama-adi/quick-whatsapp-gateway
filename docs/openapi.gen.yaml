            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Delete a session
      tags:
        - Sessions
    get:
      operationId: getSession
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WASession"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get a session
      tags:
        - Sessions
  /api/v1/sessions/{session}/backfill:
    get:
      operationId: backupStatus
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillImport"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Latest backup import status
      tags:
        - Backup
    post:
      operationId: importBackup
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file:
                contentType: application/octet-stream
              key:
                contentType: text/plain
            schema:
              properties:
                file:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
                key:
                  type: string
              required:
                - file
                - key
              type: object
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillImport"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Import a WhatsApp backup (crypt15)
      tags:
