components:
  schemas:
    AddGroupMembersInputBody:
      additionalProperties: false
      properties:
        participants:
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    ApiError:
      additionalProperties: false
      type: object
    ApproveGroupMembersInputBody:
      additionalProperties: false
      properties:
        participants:
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    AuthCodeEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - auth.code
          examples:
            - auth.code
          type: string
        payload:
          $ref: "#/components/schemas/AuthCodePayload"
      required:
        - event
        - payload
      type: object
    AuthCodePayload:
      additionalProperties: false
      properties:
        businessName:
          description: The account's WhatsApp Business display name, if it is a business account.
          type: string
        jid:
          description: The linked phone JID (e.g. 6281234567890@s.whatsapp.net).
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        lid:
          description: The linked-device identifier (LID) WhatsApp assigned to this device.
          type: string
        platform:
          description: The device platform WhatsApp reports (e.g. android, iphone, web).
          type: string
      type: object
    AuthQREvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - auth.qr
          examples:
            - auth.qr
          type: string
        payload:
          $ref: "#/components/schemas/AuthQRPayload"
      required:
        - event
        - payload
      type: object
    AuthQRPayload:
      additionalProperties: false
      properties:
        code:
          description: The QR code content to render as a QR image for the user to scan in WhatsApp → Linked devices.
          examples:
            - 2@abc123...
          type: string
      required:
        - code
      type: object
    BackfillImport:
      additionalProperties: false
      properties:
        chats:
          format: int64
          type: integer
        createdAt:
          format: int64
          type: integer
        error:
          type: string
        finishedAt:
          format: int64
          type: integer
        groupMembers:
          format: int64
          type: integer
        groups:
          format: int64
          type: integer
        id:
          type: string
        identities:
          format: int64
          type: integer
        messages:
          format: int64
          type: integer
        organizationId:
          type: string
        schemaFingerprint:
          type: string
        sessionId:
          type: string
        source:
          type: string
        status:
          type: string
      required:
        - id
        - sessionId
        - organizationId
        - source
        - status
        - chats
        - messages
        - identities
        - groups
        - groupMembers
        - createdAt
      type: object
    BackfillJob:
      additionalProperties: false
      properties:
        contacts:
          format: int64
          type: integer
        error:
          type: string
        finishedAt:
          format: int64
          type: integer
        groupMembers:
          format: int64
          type: integer
        groups:
          format: int64
          type: integer
        id:
          type: string
        organizationId:
          type: string
        sessionId:
          type: string
        startedAt:
          format: int64
          type: integer
        status:
          type: string
      required:
        - id
        - sessionId
        - organizationId
        - status
        - contacts
        - groups
        - groupMembers
        - startedAt
      type: object
    CallEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - call.incoming
          examples:
            - call.incoming
          type: string
        payload:
          $ref: "#/components/schemas/CallPayload"
      required:
        - event
        - payload
      type: object
    CallPayload:
      additionalProperties: false
      properties:
        callId:
          description: WhatsApp's call id.
          type: string
        from:
          description: JID of the caller.
          type: string
        groupJid:
          description: JID of the group, for a group call.
          type: string
        isGroup:
          description: True for a group call.
          type: boolean
        timestamp:
          description: When the call came in, epoch milliseconds.
          format: int64
          type: integer
      required:
        - callId
        - from
        - timestamp
        - isGroup
      type: object
    Chat:
      additionalProperties: false
      properties:
        archived:
          type: boolean
        id:
          format: int64
          minimum: 0
          type: integer
        jid:
          type: string
        lastMessageAt:
          format: int64
          type: integer
        mutedUntil:
          format: int64
          type: integer
        name:
          type: string
        pinned:
          type: boolean
        sessionId:
          type: string
        type:
          type: string
        unreadCount:
          format: int64
          type: integer
      required:
        - id
        - sessionId
        - jid
        - type
        - unreadCount
        - archived
        - pinned
      type: object
    ChatPresenceInputBody:
      additionalProperties: false
      properties:
        state:
          type: string
      type: object
    ChatUpdateEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - chat.update
          examples:
            - chat.update
          type: string
        payload:
          $ref: "#/components/schemas/ChatUpdatePayload"
      required:
        - event
        - payload
      type: object
    ChatUpdatePayload:
      additionalProperties: false
      properties:
        change:
          description: What changed; currently picture.
          examples:
            - picture
          type: string
        chatJid:
          description: JID of the chat that changed.
          type: string
        pictureId:
          description: Id of the new profile picture, when set.
          type: string
        removed:
          description: True if the picture was removed rather than changed.
          type: boolean
      required:
        - chatJid
        - change
      type: object
    Contact:
      additionalProperties: false
      properties:
        businessName:
          type: string
        lid:
          type: string
        name:
          type: string
        phoneNumber:
          type: string
        source:
          type: string
      required:
        - lid
        - source
      type: object
    ContactAboutOutputBody:
      additionalProperties: false
      properties:
        about:
          type: string
      required:
        - about
      type: object
    ContactCard:
      additionalProperties: false
      properties:
        name:
          type: string
        phone:
          type: string
        vcard:
          type: string
      type: object
    ContactData:
      additionalProperties: false
      properties:
        displayName:
          description: The contact's display name.
          type: string
        vcard:
          description: The raw vCard for the shared contact.
          type: string
      type: object
    ContactDetail:
      additionalProperties: false
      properties:
        dm:
          type: boolean
        groups:
          items:
            $ref: "#/components/schemas/ContactGroup"
          type:
            - array
            - "null"
        identity:
          $ref: "#/components/schemas/Identity"
      required:
        - dm
        - groups
      type: object
    ContactGroup:
      additionalProperties: false
      properties:
        jid:
          type: string
        lastSeen:
          format: int64
          type: integer
        name:
          type: string
        role:
          type: string
        tag:
          type: string
      required:
        - jid
        - role
        - lastSeen
      type: object
    ContactUpdateEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - contact.update
          examples:
            - contact.update
          type: string
        payload:
          $ref: "#/components/schemas/ContactUpdatePayload"
      required:
        - event
        - payload
      type: object
    ContactUpdatePayload:
      additionalProperties: false
      properties:
        firstName:
          description: The first name from the address book, when known.
          type: string
        fullName:
          description: The full name from the address book, when known.
          type: string
        jid:
          description: JID of the contact that changed.
          type: string
        pushName:
          description: The contact's current WhatsApp display (push) name.
          type: string
      required:
        - jid
      type: object
    CreateChannelInputBody:
      additionalProperties: false
      properties:
        description:
          type: string
        name:
          type: string
      type: object
    CreateChannelOutputBody:
      additionalProperties: false
      properties:
        jid:
          type: string
      required:
        - jid
      type: object
    CreateGroupInputBody:
      additionalProperties: false
      properties:
        name:
          type: string
        participants:
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    CreateSessionInputBody:
      additionalProperties: false
      properties:
        autoRead:
          type: boolean
        label:
          type: string
        presenceTyping:
          type: boolean
        start:
          type: boolean
      type: object
    EditMessageInputBody:
      additionalProperties: false
      properties:
        chat:
          type: string
        text:
          type: string
      type: object
    FormFile:
      additionalProperties: false
      properties:
        ContentType:
          type: string
        Filename:
          type: string
        IsSet:
          type: boolean
        Size:
          format: int64
          type: integer
      required:
        - ContentType
        - IsSet
        - Size
        - Filename
      type: object
    ForwardInputBody:
      additionalProperties: false
      properties:
        chat:
          type: string
        sender:
          type: string
        to:
          type: string
      type: object
    Group:
      additionalProperties: false
      properties:
        createdAtWa:
          format: int64
          type: integer
        description:
          type: string
        firstSeenAt:
          format: int64
          type: integer
        groupJid:
          type: string
        id:
          format: int64
          minimum: 0
          type: integer
        isAnnounce:
          type: boolean
        isLocked:
          type: boolean
        ownerJid:
          type: string
        participantCount:
          format: int64
          type: integer
        subject:
          type: string
        updatedAt:
          format: int64
          type: integer
      required:
        - id
        - groupJid
        - firstSeenAt
        - updatedAt
      type: object
    GroupEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - group.update
            - group.participant
          examples:
            - group.update
          type: string
        payload:
          $ref: "#/components/schemas/GroupPayload"
      required:
        - event
        - payload
      type: object
    GroupInfo:
      additionalProperties: false
      properties:
        description:
          type: string
        groupJid:
          type: string
        isAnnounce:
          type: boolean
        isLocked:
          type: boolean
        ownerJid:
          type: string
        participants:
          format: int64
          type: integer
        subject:
          type: string
      required:
        - groupJid
      type: object
    GroupMember:
      additionalProperties: false
      properties:
        firstSeenAt:
          format: int64
          type: integer
        groupJid:
          type: string
        id:
          format: int64
          minimum: 0
          type: integer
        lastSeenAt:
          format: int64
          type: integer
        lid:
          type: string
        role:
          type: string
        sessionId:
          type: string
        tag:
          type: string
      required:
        - id
        - sessionId
        - groupJid
        - lid
        - role
        - firstSeenAt
        - lastSeenAt
      type: object
    GroupPayload:
      additionalProperties: false
      properties:
        demote:
          description: JIDs demoted from admin.
          items:
            type: string
          type:
            - array
            - "null"
        description:
          description: New group description, when it changed.
          type: string
        groupJid:
          description: JID of the group.
          examples:
            - 123456789-987654321@g.us
          type: string
        isAnnounce:
          description: "Announce mode: when true only admins can send messages."
          type: boolean
        isLocked:
          description: "Locked mode: when true only admins can edit group info."
          type: boolean
        join:
          description: JIDs that joined the group.
          items:
            type: string
          type:
            - array
            - "null"
        leave:
          description: JIDs that left or were removed.
          items:
            type: string
          type:
            - array
            - "null"
        newInviteLink:
          description: New invite link, when it was reset.
          type: string
        promote:
          description: JIDs promoted to admin.
          items:
            type: string
          type:
            - array
            - "null"
        reason:
          description: Reason/context for the change, when WhatsApp provides one.
          type: string
        sender:
          description: JID of the member who made the change.
          type: string
        subject:
          description: New group subject (name), when it changed.
          type: string
        timestamp:
          description: When the change happened, epoch milliseconds.
          format: int64
          type: integer
      required:
        - groupJid
      type: object
    Identity:
      additionalProperties: false
      properties:
        businessName:
          type: string
        firstSeenAt:
          format: int64
          type: integer
        id:
          format: int64
          minimum: 0
          type: integer
        lid:
          type: string
        name:
          type: string
        phoneJid:
          type: string
        phoneNumber:
          type: string
        updatedAt:
          format: int64
          type: integer
      required:
        - id
        - lid
        - firstSeenAt
        - updatedAt
      type: object
    InviteOutputBody:
      additionalProperties: false
      properties:
        invite:
          type: string
      required:
        - invite
      type: object
    JoinGroupInputBody:
      additionalProperties: false
      properties:
        invite:
          type: string
      type: object
    JoinGroupOutputBody:
      additionalProperties: false
      properties:
        groupJid:
          type: string
      required:
        - groupJid
      type: object
    ListChat:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/Chat"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListContact:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/Contact"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListGroup:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/Group"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListGroupMember:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/GroupMember"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListMessage:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/Message"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListWASession:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/WASession"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    ListWebhook:
      additionalProperties: false
      properties:
        data:
          items:
            $ref: "#/components/schemas/Webhook"
          type:
            - array
            - "null"
        nextCursor:
          type: string
      required:
        - data
      type: object
    LocationData:
      additionalProperties: false
      properties:
        address:
          description: Optional street address.
          type: string
        latitude:
          description: Latitude in decimal degrees.
          examples:
            - -6.2
          format: double
          type: number
        longitude:
          description: Longitude in decimal degrees.
          examples:
            - 106.8
          format: double
          type: number
        name:
          description: Optional place name.
          type: string
      required:
        - latitude
        - longitude
      type: object
    Me:
      additionalProperties: false
      properties:
        connected:
          type: boolean
        phoneNumber:
          type: string
        sessionId:
          type: string
        status:
          type: string
        waJid:
          type: string
        waLid:
          type: string
      required:
        - sessionId
        - status
        - connected
      type: object
    MediaMeta:
      additionalProperties: false
      properties:
        filename:
          description: Original filename, for document messages.
          type: string
        mimetype:
          description: Media MIME type, e.g. image/jpeg.
          examples:
            - image/jpeg
          type: string
        size:
          description: Media size in bytes.
          format: int64
          type: integer
      type: object
    Message:
      additionalProperties: false
      properties:
        ackLevel:
          format: int64
          type: integer
        body:
          type: string
        chatJid:
          type: string
        createdAt:
          format: int64
          type: integer
        deleted:
          type: boolean
        direction:
          type: string
        edited:
          type: boolean
        error:
          type: string
        fromMe:
          type: boolean
        hasMedia:
          type: boolean
        id:
          type: string
        media:
          $ref: "#/components/schemas/MediaMeta"
        mentionNames:
          additionalProperties:
            type: string
          type: object
        mentions: {}
        quotedMessageId:
          type: string
        senderJid:
          type: string
        senderLid:
          type: string
        senderName:
          type: string
        sessionId:
          type: string
        status:
          type: string
        timestamp:
          format: int64
          type: integer
        type:
          type: string
        waMessageId:
          type: string
      required:
        - id
        - sessionId
        - waMessageId
        - chatJid
        - fromMe
        - direction
        - type
        - hasMedia
        - edited
        - deleted
        - timestamp
        - createdAt
      type: object
    MessageEvent:
      additionalProperties: false
      properties:
        event:
          description: The event type.
          enum:
            - message
            - message.from_me
            - message.reaction
            - message.edited
            - message.revoked
            - poll.vote
          examples:
            - message
          type: string
        payload:
          $ref: "#/components/schemas/MessagePayload"
      required:
        - event
        - payload
      type: object
    MessagePayload:
      additionalProperties: false
      properties:
        body:
          description: Text body, for text and caption-bearing messages.
          examples:
            - Hello!
          type: string
        chatJid:
          description: JID of the chat the message belongs to (a user, group, or broadcast list).
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        contact:
          $ref: "#/components/schemas/ContactData"
          description: Set when type is contact.
        fromMe:
          description: True if this account authored the message (the message.from_me event).
          type: boolean
        hasMedia:
          description: True if the message carried media. The media itself is metadata-only in v1 (no download).
          type: boolean
        location:
          $ref: "#/components/schemas/LocationData"
          description: Set when type is location.
        media:
          $ref: "#/components/schemas/MediaMeta"
          description: Media descriptor. Always null in v1 (metadata-only); see hasMedia.
        mentions:
          description: JIDs mentioned in the message body.
          items:
            type: string
          type:
            - array
            - "null"
        poll:
          $ref: "#/components/schemas/PollData"
          description: Set when type is poll (poll creation).
        pushName:
          description: The sender's WhatsApp display (push) name at send time.
          type: string
        quotedMessageId:
          description: If this message quotes/replies to another, that message's id.
          type: string
        reaction:
          description: "For message.reaction: the emoji reacted with; empty string means the reaction was removed."
          type: string
        selectedHashes:
          description: "For poll.vote: the encrypted option hashes the voter selected."
          items:
            type: string
          type:
            - array
            - "null"
        senderJid:
          description: JID of the sender (set for group messages; for DMs it equals the chat).
          type: string
        senderLid:
          description: The sender's linked-device id, when available.
          type: string
        targetId:
          description: "For reaction/edit/revoke: the id of the message being reacted to, edited, or revoked."
          type: string
        timestamp:
          description: When WhatsApp timestamped the message, in epoch milliseconds.
          format: int64
          type: integer
        type:
          description: "Content type of the message: text, location, contact, poll, reaction, edit, revoke, media, and others."
          examples:
            - text
          type: string
        waMessageId:
          description: WhatsApp's message id (stanza id), unique within the chat.
          examples:
            - 3EB0...
          type: string
      required:
        - waMessageId
        - chatJid
        - fromMe
        - type
        - hasMedia
        - media
        - timestamp
      type: object
    MessageStatusEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - message.status
          examples:
            - message.status
          type: string
        payload:
          $ref: "#/components/schemas/MessageStatusPayload"
      required:
        - event
        - payload
      type: object
    MessageStatusPayload:
      additionalProperties: false
      properties:
        chatJid:
          description: JID of the chat the receipt is for.
          type: string
        messageIds:
          description: The message ids whose status advanced.
          items:
            type: string
          type:
            - array
            - "null"
        senderJid:
          description: JID of the participant the receipt came from (group chats).
          type: string
        status:
          description: "New delivery status, in progression order: sent (left this device) → delivered (reached the recipient device) → read (recipient opened it) → played (voice/video note played). May also be failed."
          enum:
            - pending
            - sent
            - delivered
            - read
            - played
            - failed
          examples:
            - delivered
          type: string
        timestamp:
          description: When the receipt was generated, epoch milliseconds.
          format: int64
          type: integer
      required:
        - chatJid
        - messageIds
        - status
        - timestamp
      type: object
    MuteChannelInputBody:
      additionalProperties: false
      properties:
        mute:
          type: boolean
      type: object
    NewsletterEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - newsletter.update
          examples:
            - newsletter.update
          type: string
        payload:
          $ref: "#/components/schemas/NewsletterPayload"
      required:
        - event
        - payload
      type: object
    NewsletterPayload:
      additionalProperties: false
      properties:
        action:
          description: "What happened: join, leave, or mute."
          enum:
            - join
            - leave
            - mute
          examples:
            - join
          type: string
        jid:
          description: JID of the newsletter/channel.
          type: string
      required:
        - jid
        - action
      type: object
    OnWhatsApp:
      additionalProperties: false
      properties:
        isOnWhatsApp:
          type: boolean
        jid:
          type: string
        query:
          type: string
      required:
        - query
        - isOnWhatsApp
      type: object
    PairingCodeInputBody:
      additionalProperties: false
      properties:
        phone:
          type: string
      type: object
    PairingCodeOutputBody:
      additionalProperties: false
      properties:
        code:
          type: string
      required:
        - code
      type: object
    PollData:
      additionalProperties: false
      properties:
        name:
          description: The poll question.
          type: string
        options:
          description: The poll answer options, in order.
          items:
            type: string
          type:
            - array
            - "null"
        selectableCount:
          description: How many options a voter may select (1 = single choice).
          examples:
            - 1
          format: int64
          type: integer
      required:
        - name
        - options
        - selectableCount
      type: object
    PostStatusInputBody:
      additionalProperties: false
      properties:
        text:
          type: string
        type:
          type: string
      type: object
    PostStatusOutputBody:
      additionalProperties: false
      properties:
        messageId:
          type: string
      required:
        - messageId
      type: object
    PresenceEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - presence.update
          examples:
            - presence.update
          type: string
        payload:
          $ref: "#/components/schemas/PresencePayload"
      required:
        - event
        - payload
      type: object
    PresencePayload:
      additionalProperties: false
      properties:
        chatJid:
          description: Chat the presence applies to, for chat (typing) presence.
          type: string
        from:
          description: JID whose presence changed.
          type: string
        lastSeen:
          description: Last-seen time in epoch milliseconds, when the contact shares it.
          format: int64
          type: integer
        media:
          description: "For chat presence, the kind being composed: text or audio."
          enum:
            - text
            - audio
          type: string
        state:
          description: "Presence state: available (online), unavailable (offline), composing (typing), or paused (stopped typing)."
          enum:
            - available
            - unavailable
            - composing
            - paused
          examples:
            - composing
          type: string
        unavailable:
          description: True when the contact went offline.
          type: boolean
      required:
        - from
        - state
      type: object
    ProfilePicture:
      additionalProperties: false
      properties:
        id:
          type: string
        url:
          type: string
      type: object
    QR:
      additionalProperties: false
      properties:
        code:
          type: string
        expiresAt:
          format: int64
          type: integer
      required:
        - code
      type: object
    ReactionInputBody:
      additionalProperties: false
      properties:
        chat:
          type: string
        emoji:
          type: string
        sender:
          type: string
      type: object
    RetryPolicy:
      additionalProperties: false
      properties:
        attempts:
          format: int64
          type: integer
        delaySeconds:
          format: int64
          type: integer
        policy:
          type: string
      required:
        - policy
        - delaySeconds
        - attempts
      type: object
    RevokeMessageInputBody:
      additionalProperties: false
      properties:
        chat:
          type: string
        sender:
          type: string
      type: object
    SendRequest:
      additionalProperties: false
      properties:
        contact:
          $ref: "#/components/schemas/ContactCard"
        latitude:
          format: double
          type: number
        longitude:
          format: double
          type: number
        mentions:
          items:
            type: string
          type:
            - array
            - "null"
        name:
          type: string
        options:
          items:
            type: string
          type:
            - array
            - "null"
        replyTo:
          type: string
        selectableCount:
          format: int64
          type: integer
        text:
          type: string
        to:
          type: string
        type:
          type: string
      required:
        - type
        - to
      type: object
    SendResult:
      additionalProperties: false
      properties:
        mode:
          type: string
        outboxId:
          type: string
        replayed:
          type: boolean
        status:
          type: string
        timestamp:
          format: int64
          type: integer
        waMessageId:
          type: string
      required:
        - mode
      type: object
    SessionStatusEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - session.status
          examples:
            - session.status
          type: string
        payload:
          $ref: "#/components/schemas/SessionStatusPayload"
      required:
        - event
        - payload
      type: object
    SessionStatusPayload:
      additionalProperties: false
      properties:
        status:
          description: "New session status. One of: starting (connecting), scan_qr_code (waiting for a QR scan or pairing code), working (connected and ready to send/receive), failed (connection failed; will retry), stopped (intentionally stopped), logged_out (the WhatsApp account unlinked the device — must re-pair)."
          enum:
            - starting
            - scan_qr_code
            - working
            - failed
            - stopped
            - logged_out
          examples:
            - working
          type: string
      required:
        - status
      type: object
    SetPresenceInputBody:
      additionalProperties: false
      properties:
        state:
          type: string
      type: object
    UpdateChatInputBody:
      additionalProperties: false
      properties:
        archived:
          type: boolean
        mutedUntil:
          format: int64
          type: integer
        pinned:
          type: boolean
        unmute:
          type: boolean
      type: object
    UpdateGroupInputBody:
      additionalProperties: false
      properties:
        announce:
          type: boolean
        description:
          type: string
        locked:
          type: boolean
        subject:
          type: string
      type: object
    VoteInputBody:
      additionalProperties: false
      properties:
        chat:
          type: string
        options:
          items:
            type: string
          type:
            - array
            - "null"
        sender:
          type: string
      type: object
    WASession:
      additionalProperties: false
      properties:
        autoRead:
          type: boolean
        createdAt:
          format: int64
          type: integer
        createdByUserId:
          type: string
        gatewayId:
          type: string
        id:
          type: string
        isAdminSession:
          type: boolean
        label:
          type: string
        lastConnectedAt:
          format: int64
          type: integer
        organizationId:
          type: string
        phoneNumber:
          type: string
        presenceTyping:
          type: boolean
        ratePerHour:
          format: int64
          type: integer
        ratePerMin:
          format: int64
          type: integer
        status:
          type: string
        updatedAt:
          format: int64
          type: integer
        waJid:
          type: string
        waLid:
          type: string
      required:
        - id
        - organizationId
        - gatewayId
        - status
        - isAdminSession
        - autoRead
        - presenceTyping
        - ratePerMin
        - ratePerHour
        - createdAt
        - updatedAt
      type: object
    Webhook:
      additionalProperties: false
      properties:
        active:
          type: boolean
        createdAt:
          format: int64
          type: integer
        customHeaders:
          additionalProperties:
            type: string
          type: object
        events:
          items:
            type: string
          type:
            - array
            - "null"
        id:
          type: string
        organizationId:
          type: string
        retryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
        sessionId:
          type: string
        updatedAt:
          format: int64
          type: integer
        url:
          type: string
      required:
        - id
        - organizationId
        - url
        - events
        - retryPolicy
        - active
        - createdAt
        - updatedAt
      type: object
    WebhookBody:
      additionalProperties: false
      properties:
        active:
          type: boolean
        customHeaders:
          additionalProperties:
            type: string
          type: object
        events:
          items:
            type: string
          type:
            - array
            - "null"
        retryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
        secret:
          type: string
        sessionId:
          type: string
        url:
          type: string
      type: object
info:
  title: WhatsApp Gateway API
  version: v1
openapi: 3.1.0
paths:
  /api/v1/admin/sessions:
