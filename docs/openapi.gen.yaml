info:
  title: WhatsApp Gateway API
  version: v1
openapi: 3.1.0
paths:
  /api/v1/admin/sessions:
    get:
      operationId: adminListSessions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWASession"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List all sessions (admin)
      tags:
        - Admin
  /api/v1/admin/sessions/{session}/backfill:
    get:
      operationId: adminSessionBackfillStatus
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get session backfill status (admin)
      tags:
        - Admin
  /api/v1/admin/sessions/{session}:backfill:
    post:
      operationId: adminStartSessionBackfill
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Start a session backfill (admin)
      tags:
        - Admin
  /api/v1/sessions:
    get:
      operationId: listSessions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWASession"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List sessions
      tags:
        - Sessions
    post:
      operationId: createSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WASession"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Create a session
      tags:
        - Sessions
  /api/v1/sessions/{session}:
    delete:
      operationId: deleteSession
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Delete a session
      tags:
        - Sessions
    get:
      operationId: getSession
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WASession"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get a session
      tags:
        - Sessions
  /api/v1/sessions/{session}/backfill:
    get:
      operationId: backupStatus
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillImport"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Latest backup import status
      tags:
        - Backup
    post:
      operationId: importBackup
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file:
                contentType: application/octet-stream
              key:
                contentType: text/plain
            schema:
              properties:
                file:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
                key:
                  type: string
              required:
                - file
                - key
              type: object
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillImport"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Import a WhatsApp backup (crypt15)
      tags:
        - Backup
  /api/v1/sessions/{session}/channels:
    post:
      operationId: createChannel
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelOutputBody"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Create a channel
      tags:
        - Channels
  /api/v1/sessions/{session}/channels/{jid}/messages:
    get:
      operationId: listChannelMessages
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
        - in: path
          name: jid
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMessage"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List channel messages
      tags:
        - Channels
  /api/v1/sessions/{session}/channels/{jid}:follow:
    post:
      operationId: followChannel
      parameters:
        - in: path
          name: session
          required: true
          schema:
            type: string
        - in: path
          name: jid
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
