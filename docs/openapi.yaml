        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Add members to a group
      tags:
        - Groups
  /api/v1/sessions/{session}/groups/{gid}/members/{jid}:
