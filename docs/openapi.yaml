openapi: 3.1.0
info:
  title: whatsmeow Gateway API
  version: 1.0.0
  description: >
    REST API for the WhatsApp gateway. Every session (one attached WhatsApp
    number) belongs to one organization, and a caller only ever sees the sessions
    of the organization it is acting as. This document is the contract of record
    and is served as-is at /api/v1/openapi.yaml (there is no Swagger UI).


    **Base path.** All endpoints below are under `/api/v1`, except the unauthenticated
    probes `/healthz`, `/readyz`, and `/openapi.yaml`, which sit at the root.


    **Authenticating.** Send one `Authorization: Bearer <token>` header. The token
    is one of two kinds, and which one you send decides what you can do:


      * A **JWT** — a signed login token minted by the frontend for a logged-in
        person. The gateway checks the signature against the frontend's public keys
        (JWKS). What the person can do follows their role in the organization:
        an owner or admin can do everything; a member can read and send.
      * An **api-key** — a long-lived token for a script or service, prefixed `wa_`.
        It may also be sent in an `x-api-key` header instead of `Authorization`.
        Each key is granted some mix of four permissions — `read`, `send`,
        `manage`, and `events` — and can only call endpoints those permissions allow.


    Creating users, organizations, and api-keys all happen in the frontend, not here;
    the gateway only verifies the token it is handed.


    **Permissions per endpoint.** Each endpoint requires one of these capabilities:
    `read` (GET data), `send` (send messages, post status, set presence, run group
    operations), `manage` (create/start/stop sessions and configure webhooks),
    `events` (subscribe to the event stream). A JWT grants these from the person's
    org role; an api-key grants exactly the permissions it was given.


    **Errors.** Every error response has the same shape:
    `{ "error": { "code": "...", "message": "...", "details": ... } }`. The `code`
    is a stable string (for example `not_found`, `unauthorized`, `validation_error`)
    and is the field to branch on in code.


    **Pagination.** List endpoints accept `?limit=` and an opaque `?cursor=`, and
    return `{ "data": [ ... ], "nextCursor": "..." }`. To get the next page, pass the
    returned `nextCursor` back as `?cursor=`. When `nextCursor` is absent or empty,
    there are no more pages. Treat the cursor as opaque — do not parse it.


    **Not yet implemented in v1.** Some operations return `501 not_implemented`:
    sending media (image, video, audio, document, sticker), posting an image status,
    all channel operations, and approving pending group join requests. The text,
    poll, location, and contact message types do work.
servers:
  - url: /api/v1
    description: API base
security:
  - bearerAuth: []
  - apiKeyHeader: []
tags:
  - name: Health
  - name: Sessions
  - name: Messages
  - name: Chats
  - name: Contacts
  - name: Groups
  - name: Channels
  - name: Status & Presence
  - name: Events
  - name: Webhooks
  - name: Admin

paths:
  # ----------------------------------------------------------------- Health
  /healthz:
    servers:
      - url: /
    get:
      tags: [Health]
      summary: Liveness probe
      description: >-
        Returns 200 as long as the process is running. No authentication. Use it to
        tell whether the gateway is up at all; it does not check the database or Redis
        (use the readiness probe for that).
      operationId: healthz
      security: []
      responses:
        "200":
          description: Process is running.
          content:
            text/plain:
              schema: { type: string, example: ok }
  /readyz:
    servers:
      - url: /
    get:
      tags: [Health]
      summary: Readiness probe
      description: >-
        Returns 200 once the gateway can reach its dependencies (the database and
        Redis), and 500 while it cannot. No authentication. Use it to decide whether
        the gateway is ready to take traffic, not just whether the process is alive.
      operationId: readyz
      security: []
      responses:
        "200":
          description: Ready.
          content:
            text/plain:
              schema: { type: string, example: ready }
        "500":
          $ref: "#/components/responses/Error"

  /openapi.yaml:
    get:
      tags: [Health]
      summary: This OpenAPI document
      description: >-
        Returns this OpenAPI document as YAML. No authentication. This is the same
        contract you are reading, served straight from the running gateway.
      operationId: openapi
      security: []
      responses:
        "200":
          description: The OpenAPI spec.
          content:
            application/yaml:
              schema: { type: string }

  # --------------------------------------------------------------- Sessions
  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      description: >-
        Lists the sessions (attached WhatsApp numbers) belonging to the caller's
        organization. Requires the `manage` capability. Each session shows its status,
        the number once paired, and which gateway holds it.
      operationId: listSessions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: A page of sessions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionPage" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      tags: [Sessions]
      summary: Create a session
      description: >-
        Creates a new session (a slot for one WhatsApp number) in the caller's
        organization. Requires the `manage` capability. The session starts unpaired;
        to attach a number, link a device with the QR code or request a phone pairing
        code. Set `start: true` in the body to begin QR pairing right away.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /sessions/{session}:
    parameters:
      - $ref: "#/components/parameters/Session"
    get:
      tags: [Sessions]
      summary: Get a session
      description: >-
        Returns one session by id, including its current status and (once paired) the
        attached number. Requires the `manage` capability. A session in another
        organization returns 404, not 403.
      operationId: getSession
      responses:
        "200":
          description: The session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Sessions]
      summary: Delete a session
      description: >-
        Permanently deletes a session and its stored data. Requires the `manage`
        capability. This removes the session for good; if a number is still attached,
        log it out first to unlink the device. Returns 204 with no body.
      operationId: deleteSession
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}:start:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Sessions]
      summary: Start a session
      description: >-
        Connects an already-paired session to WhatsApp. Requires the `manage`
        capability. The session must already have a number attached; to pair a new
        session, use the QR code or pairing-code endpoints instead. Returns the
        refreshed session so you can see its new status.
      operationId: startSession
      responses:
        "200":
          description: Session started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "404": { $ref: "#/components/responses/Error" }
  /sessions/{session}:stop:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Sessions]
      summary: Stop a session
      description: >-
        Disconnects a session from WhatsApp without unlinking the device. Requires the
        `manage` capability. The number stays paired, so you can start it again later.
        Returns the refreshed session so you can see its new status.
      operationId: stopSession
      responses:
        "200":
          description: Session stopped.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "404": { $ref: "#/components/responses/Error" }
  /sessions/{session}:restart:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Sessions]
      summary: Restart a session
      description: >-
        Stops and then starts the session — a reconnect that keeps the number paired.
        Requires the `manage` capability. Use this to recover a session that is stuck
        or failed. Returns the refreshed session so you can see its new status.
      operationId: restartSession
      responses:
        "200":
          description: Session restarted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "404": { $ref: "#/components/responses/Error" }
  /sessions/{session}:logout:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Sessions]
      summary: Log out a session (unpair the device)
      description: >-
        Logs the session out of WhatsApp and unlinks the device, so the number is no
        longer attached. Requires the `manage` capability. To use the number again you
        must pair it from scratch. The session row itself stays; use delete to remove
        it entirely. Returns the refreshed session so you can see its new status.
      operationId: logoutSession
      responses:
        "200":
          description: Session logged out.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WASession" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/me:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    get:
      tags: [Sessions]
      summary: Get the connected account's own identity
      description: >-
        Returns the WhatsApp identity of the number attached to this session — its
        JID, linked-device id, push name, and phone number. Requires the `manage`
        capability. Returns 404 if the session is not paired yet.
      operationId: sessionMe
      responses:
        "200":
          description: Own identity.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionMe" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/qr:
    parameters:
      - $ref: "#/components/parameters/Session"
      - name: format
        in: query
        required: false
        schema: { type: string, enum: [image] }
        description: Return a QR image instead of the raw code string.
    get:
      tags: [Sessions]
      summary: Get the current pairing QR code
      description: >-
        Returns the QR code to scan from WhatsApp on the phone to attach a number to
        this session. Requires the `manage` capability. By default returns the raw code
        string; pass `?format=image` for a PNG. If no code is ready yet, this starts
        pairing and returns 404 — codes also refresh and stream live over the event
        stream as `auth.qr`, so subscribe there to follow along. Returns an error if
        the session is already paired.
      operationId: sessionQR
      responses:
        "200":
          description: QR code (raw code, or PNG when ?format=image).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QRCode" }
            image/png:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/pairing-code:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Sessions]
      summary: Request a phone pairing code
      description: >-
        Requests a pairing code to attach a number without scanning a QR — the
        alternative to the QR endpoint. Requires the `manage` capability. Pass the
        phone number to pair in the body; the response returns a short code (for
        example `ABCD-1234`) to enter in WhatsApp on that phone under Link a device.
        Returns an error if the session is already paired.
      operationId: sessionPairingCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "628123456789" }
      responses:
        "200":
          description: Pairing code.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string, example: "ABCD-1234" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  # --------------------------------------------------------------- Messages
  /sessions/{session}/messages:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Messages]
      summary: Send a message
      description: >-
        Sends one message. There is a single send endpoint for every kind of
        message; the `type` field in the body chooses which one. `text`, `poll`,
        `location`, and `contact` work in v1. The media types `image`, `video`,
        `audio`, `document`, and `sticker` are not built yet and return 501
        before any WhatsApp call is made.


        Two optional controls:


        - `Idempotency-Key` (header): if you retry a send with the same key, the
          gateway returns the result of the first send and does not send a second
          message to WhatsApp. The key is scoped to your organization.

        - `?async=true` (query): the gateway saves the send to a queue and returns
          right away instead of waiting for WhatsApp to acknowledge it. The final
          delivery status arrives later as a `message.status` event on the event
          stream. Without `?async`, the call blocks until WhatsApp acknowledges
          the send.


        Requires the `send` capability. Over the per-session rate limit, a
        synchronous send returns 429; an async send stays queued instead.
      operationId: sendMessage
      parameters:
        - name: async
          in: query
          required: false
          schema: { type: boolean }
          description: Enqueue and return immediately instead of sending inline.
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendRequest" }
      responses:
        "200":
          description: Sent (or accepted when async).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendResult" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/messages/{mid}:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/MessageID"
    patch:
      tags: [Messages]
      summary: Edit a sent text message
      description: >-
        Replaces the text of a message you already sent, identified by `mid` in
        the path. Only text messages can be edited. Requires the `send`
        capability.
      operationId: editMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Messages]
      summary: Revoke a message (delete for everyone)
      description: >-
        Deletes a message you sent (the `mid` in the path) for everyone in the
        chat, not just on your device. Requires the `send` capability.
      operationId: revokeMessage
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/messages/{mid}/reaction:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/MessageID"
    post:
      tags: [Messages]
      summary: Add a reaction to a message
      description: >-
        Reacts to the message in the path (`mid`) with a single emoji. Sending a
        new reaction replaces any reaction you previously set on that message.
        Requires the `send` capability.
      operationId: addReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji: { type: string, example: "👍" }
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Messages]
      summary: Remove your reaction from a message
      description: >-
        Clears the reaction you set on the message in the path (`mid`). Requires
        the `send` capability.
      operationId: removeReaction
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/messages/{mid}/forward:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/MessageID"
    post:
      tags: [Messages]
      summary: Forward a message to another chat
      description: >-
        Forwards the message in the path (`mid`) to the chat named by `to` (a
        recipient JID). Requires the `send` capability. Note for v1: the forwarded
        message is a text reference to the original, marked as forwarded; it does
        not copy the original body or re-upload media. A faithful copy is planned
        once the gateway can fetch a stored message by id.
      operationId: forwardMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, description: Recipient JID }
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/messages/{mid}/vote:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/MessageID"
    post:
      tags: [Messages]
      summary: Vote on a poll message
      description: >-
        Casts a vote on the poll message in the path (`mid`). `options` is the
        list of poll choices you are voting for; send the full set you want
        selected, since it replaces your previous vote. Requires the `send`
        capability.
      operationId: voteMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [options]
              properties:
                options:
                  type: array
                  items: { type: string }
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "404": { $ref: "#/components/responses/Error" }

  # ------------------------------------------------------------------ Chats
  /sessions/{session}/chats:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    get:
      tags: [Chats]
      summary: List a session's chats
      description: >-
        Returns a page of the session's chats, served from the gateway's stored
        copy. Page through results with `limit` and `cursor`; the response carries
        the next cursor. Requires the `read` capability.
      operationId: listChats
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: A page of chats.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatPage" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/chats/{cid}:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/ChatID"
    get:
      tags: [Chats]
      summary: Get a single chat
      description: >-
        Returns one chat by its id (`cid`, the chat JID). Requires the `read`
        capability.
      operationId: getChat
      responses:
        "200":
          description: The chat.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chat" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [Chats]
      summary: Update a chat's archive, pin, and mute flags
      description: >-
        Changes the archive, pin, and mute state of the chat in the path (`cid`).
        Only the fields you send are changed; omitted fields stay as they are. To
        mute, set `mutedUntil` to an epoch-millisecond timestamp; to unmute, send
        `unmute: true`. Returns the updated chat. Requires the `send` capability.
      operationId: updateChat
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateChatRequest" }
      responses:
        "200":
          description: Updated chat.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chat" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Chats]
      summary: Delete a chat
      description: >-
        Removes the chat in the path (`cid`) from the gateway's stored copy. This
        is a local delete only; it does not delete the chat on WhatsApp. Returns
        204 with no body. Requires the `send` capability.
      operationId: deleteChat
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/chats/{cid}/messages:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/ChatID"
      - $ref: "#/components/parameters/Limit"
      - $ref: "#/components/parameters/Cursor"
    get:
      tags: [Chats]
      summary: List messages in a chat
      description: >-
        Returns a page of messages in the chat named by `cid`, served from the
        gateway's stored copy. Page through results with `limit` and `cursor`; the
        response carries the next cursor. Requires the `read` capability.
      operationId: listChatMessages
      responses:
        "200":
          description: A page of messages.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagePage" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/chats/{cid}/read:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/ChatID"
    post:
      tags: [Chats]
      summary: Mark a chat as read
      description: >-
        Clears the unread counter on the chat in the path (`cid`). In v1 this
        updates the gateway's own unread state, which is what the chat viewer
        reads; it does not send per-message read receipts to WhatsApp. Returns 204
        with no body. Requires the `send` capability.
      operationId: readChat
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                messageIds:
                  type: array
                  items: { type: string }
      responses:
        "204": { description: Marked read. }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/chats/{cid}/presence:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/ChatID"
    put:
      tags: [Chats]
      summary: Set typing or recording presence in a chat
      description: >-
        Tells the chat in the path (`cid`) that you are typing (`composing`),
        recording audio (`recording`), or have stopped (`paused`). This goes
        straight to WhatsApp and needs a live, connected client for the session;
        if the session has no connected client, the call returns 501. Returns 204
        with no body. Requires the `send` capability.
      operationId: chatPresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state: { type: string, enum: [composing, paused, recording] }
      responses:
        "204": { description: Presence sent. }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  # --------------------------------------------------------------- Contacts
  /sessions/{session}/contacts:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    get:
      tags: [Contacts]
      summary: List a session's contacts
      operationId: listContacts
      description: >-
        Returns the people this session has seen, one page at a time. Served
        from the gateway's stored WhatsApp data, so it works even when the
        session is not currently connected. Optional filters: `source=dm` keeps
        only people you have a direct chat with, `source=group` keeps only
        people seen in a group, `group={jid}` keeps only members of one group,
        and `q=` searches their name or number. Use `limit` and `cursor` to page
        through results.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: source
          in: query
          schema: { type: string, enum: [dm, group] }
        - name: group
          in: query
          schema: { type: string }
          description: Filter to members of this group JID.
        - name: q
          in: query
          schema: { type: string }
          description: Free-text search over name/number.
      responses:
        "200":
          description: A page of contacts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactPage" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/contacts/check:
    parameters:
      - $ref: "#/components/parameters/Session"
      - name: phone
        in: query
        required: true
        schema: { type: string }
    get:
      tags: [Contacts]
      summary: Check whether a phone number is on WhatsApp
      operationId: checkContact
      description: >-
        Asks WhatsApp whether the given `phone` number has an account, and
        returns its JID (WhatsApp's internal address) if it does. This is a live
        lookup, so the session must be connected; if it is not, the gateway
        responds 501.
      responses:
        "200":
          description: On-WhatsApp result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OnWhatsApp" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/contacts/{lid}:
    parameters:
      - $ref: "#/components/parameters/Session"
      - name: lid
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Contacts]
      summary: Get one contact
      operationId: getContact
      description: >-
        Returns everything stored for one contact, addressed by its `lid`
        (WhatsApp's stable per-account identifier for a person): their name,
        whether you have a direct chat with them, and every group you have seen
        them in, with their nickname and role in each. Served from stored data,
        so no live connection is needed.
      responses:
        "200":
          description: The contact detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactDetail" }
        "404": { $ref: "#/components/responses/Error" }

  /sessions/{session}/contacts/{jid}/picture:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    get:
      tags: [Contacts]
      summary: Get a contact's profile picture
      operationId: contactPicture
      description: >-
        Fetches the contact's current profile picture from WhatsApp and returns
        its URL and metadata. This is a live lookup, so the session must be
        connected; if it is not, the gateway responds 501.
      responses:
        "200":
          description: Profile picture URL/metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfilePicture" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/contacts/{jid}/about:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    get:
      tags: [Contacts]
      summary: Get a contact's about text
      operationId: contactAbout
      description: >-
        Fetches the contact's "about" text (the short status line on their
        profile) from WhatsApp. This is a live lookup, so the session must be
        connected; if it is not, the gateway responds 501.
      responses:
        "200":
          description: About text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  about: { type: string }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/contacts/{jid}/block:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Contacts]
      summary: Block a contact
      operationId: blockContact
      description: >-
        Tells WhatsApp to block this contact so they can no longer message the
        session. This is a live action, so the session must be connected; if it
        is not, the gateway responds 501.
      responses:
        "204": { description: Blocked. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/contacts/{jid}/unblock:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Contacts]
      summary: Unblock a contact
      operationId: unblockContact
      description: >-
        Tells WhatsApp to unblock this contact so they can message the session
        again. This is a live action, so the session must be connected; if it is
        not, the gateway responds 501.
      responses:
        "204": { description: Unblocked. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  # ----------------------------------------------------------------- Groups
  /sessions/{session}/groups:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    get:
      tags: [Groups]
      summary: List a session's groups
      operationId: listGroups
      description: >-
        Returns the groups this session belongs to, one page at a time. Served
        from the gateway's stored WhatsApp data, so it works even when the
        session is not connected. Use `limit` and `cursor` to page through
        results.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: A page of groups.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupPage" }
        "404": { $ref: "#/components/responses/Error" }
    post:
      tags: [Groups]
      summary: Create a group
      operationId: createGroup
      description: >-
        Creates a new WhatsApp group with the given `subject` (group name) and
        starting `participants` (a list of JIDs), and returns the new group's
        info. This is a live action, so the session must be connected; if it is
        not, the gateway responds 501.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, participants]
              properties:
                subject: { type: string }
                participants:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Created group.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupInfo" }
        "400": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups:join:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Groups]
      summary: Join a group by invite
      operationId: joinGroup
      description: >-
        Joins the group named by the `invite` code (the code from a WhatsApp
        group invite link) and returns the group's info. This is a live action,
        so the session must be connected; if it is not, the gateway responds
        501.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite]
              properties:
                invite: { type: string }
      responses:
        "200":
          description: Joined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupInfo" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
    get:
      tags: [Groups]
      summary: Get one group
      operationId: getGroup
      description: >-
        Returns the stored details for one group, addressed by its group JID
        (`gid`): subject, description, and settings. Served from stored data, so
        no live connection is needed.
      responses:
        "200":
          description: The group.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupInfo" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [Groups]
      summary: Update group settings
      operationId: updateGroup
      description: >-
        Changes the group's settings — subject, description, whether only admins
        can post (announce), and whether only admins can edit group info
        (locked). Send only the fields you want to change. This is a live
        action, so the session must be connected; if it is not, the gateway
        responds 501.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupSettings" }
      responses:
        "204": { description: Updated. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}:leave:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
    post:
      tags: [Groups]
      summary: Leave a group
      operationId: leaveGroup
      description: >-
        Removes the session's own account from the group. This is a live action,
        so the session must be connected; if it is not, the gateway responds
        501.
      responses:
        "204": { description: Left. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}/members:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
    get:
      tags: [Groups]
      summary: List a group's members
      operationId: listGroupMembers
      description: >-
        Returns the members of the group, each with their JID and role (member
        or admin). Served from stored data, so no live connection is needed.
      responses:
        "200":
          description: Members.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroupMember" }
        "404": { $ref: "#/components/responses/Error" }
    post:
      tags: [Groups]
      summary: Add members to a group
      operationId: addGroupMembers
      description: >-
        Adds the listed `participants` (a list of JIDs) to the group. This is a
        live action, so the session must be connected; if it is not, the gateway
        responds 501.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participants]
              properties:
                participants:
                  type: array
                  items: { type: string }
      responses:
        "204": { description: Added. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}/members:approve:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
    post:
      tags: [Groups]
      summary: Approve pending join requests (not implemented in v2)
      operationId: approveGroupMembers
      description: >-
        Approving people waiting to join a group is not part of v2's live
        WhatsApp surface, so this endpoint always responds 501.
      responses:
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}/members/{jid}:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
      - $ref: "#/components/parameters/JID"
    delete:
      tags: [Groups]
      summary: Remove a member from a group
      operationId: removeGroupMember
      description: >-
        Removes the member named by `jid` from the group. This is a live action,
        so the session must be connected; if it is not, the gateway responds
        501.
      responses:
        "204": { description: Removed. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}/members/{jid}/promote:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Groups]
      summary: Promote a member to admin
      operationId: promoteGroupMember
      description: >-
        Makes the member named by `jid` a group admin. This is a live action, so
        the session must be connected; if it is not, the gateway responds 501.
      responses:
        "204": { description: Promoted. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/groups/{gid}/members/{jid}/demote:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Groups]
      summary: Demote an admin to member
      operationId: demoteGroupMember
      description: >-
        Removes admin rights from the member named by `jid`, making them a
        regular member. This is a live action, so the session must be connected;
        if it is not, the gateway responds 501.
      responses:
        "204": { description: Demoted. }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/groups/{gid}/invite:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/GroupID"
    get:
      tags: [Groups]
      summary: Get the group invite link
      operationId: getGroupInvite
      description: >-
        Returns the group's current invite link, which anyone can use to join.
        This is a live lookup, so the session must be connected; if it is not,
        the gateway responds 501.
      responses:
        "200":
          description: Invite link.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite: { type: string }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Groups]
      summary: Reset the group invite link
      operationId: revokeGroupInvite
      description: >-
        Cancels the current invite link and generates a new one, then returns
        it. Any previously shared link stops working. This is a live action, so
        the session must be connected; if it is not, the gateway responds 501.
      responses:
        "200":
          description: New invite link.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite: { type: string }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  # --------------------------------------------------------------- Channels
  /sessions/{session}/channels:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Channels]
      summary: Create a channel (newsletter) — not in v1
      description: >-
        Create a WhatsApp channel (newsletter) on this session. Requires the `send`
        capability. Not implemented in v1: this always returns 501.
      operationId: createChannel
      responses:
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/channels/{jid}:follow:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Channels]
      summary: Follow a channel — not in v1
      description: >-
        Follow the channel identified by `jid` on this session. Requires the `send`
        capability. Not implemented in v1: this always returns 501.
      operationId: followChannel
      responses:
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/channels/{jid}:unfollow:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Channels]
      summary: Unfollow a channel — not in v1
      description: >-
        Stop following the channel identified by `jid` on this session. Requires the
        `send` capability. Not implemented in v1: this always returns 501.
      operationId: unfollowChannel
      responses:
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/channels/{jid}:mute:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
    post:
      tags: [Channels]
      summary: Mute a channel — not in v1
      description: >-
        Mute or unmute the channel identified by `jid` on this session. Requires the
        `send` capability. Not implemented in v1: this always returns 501.
      operationId: muteChannel
      responses:
        "501": { $ref: "#/components/responses/Error" }
  /sessions/{session}/channels/{jid}/messages:
    parameters:
      - $ref: "#/components/parameters/Session"
      - $ref: "#/components/parameters/JID"
      - $ref: "#/components/parameters/Limit"
      - $ref: "#/components/parameters/Cursor"
    get:
      tags: [Channels]
      summary: List stored channel messages
      description: >-
        Return a page of stored messages for the channel identified by `jid` on this
        session. Requires the `send` capability. Use `limit` and `cursor` to page;
        the response carries the next cursor.
      operationId: listChannelMessages
      responses:
        "200":
          description: A page of messages.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagePage" }
        "404": { $ref: "#/components/responses/Error" }

  # ----------------------------------------------------- Status & Presence
  /sessions/{session}/status:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    post:
      tags: [Status & Presence]
      summary: Post a status update (text; media returns 501)
      description: >-
        Post a status update (the "My Status" story) from this session. Requires the
        `send` capability. Only `type: text` works in v1; `type: image` and any other
        media return 501.
      operationId: postStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [text, image], example: text }
                text: { type: string }
      responses:
        "200": { $ref: "#/components/responses/SendResultOK" }
        "400": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  /sessions/{session}/presence:
    parameters: [ { $ref: "#/components/parameters/Session" } ]
    put:
      tags: [Status & Presence]
      summary: Set account presence (online / offline)
      description: >-
        Set the session account's global presence to `online` or `offline` (whether
        contacts see the account as available). Requires the `send` capability. This
        is account-wide; to send a typing or recording indicator into one chat, use
        the chat presence endpoint instead.
      operationId: setPresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state: { type: string, enum: [online, offline] }
      responses:
        "204": { description: Presence set. }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }

  # ----------------------------------------------------------------- Events
  /events:
    get:
      tags: [Events]
      summary: Stream events (NDJSON)
      description: >-
        Open a long-lived connection that streams events as they happen. The response
        is NDJSON: the connection stays open and the gateway writes one JSON event
        object per line, each ending in a newline. Read it line by line; do not wait
        for the body to finish. About every 20 seconds the gateway sends a
        `{"event":"ping"}` line so the connection stays alive — ignore those.

        You only ever see your own organization's events. Requires the `events`
        capability: an api-key with the `events` permission, or any JWT.

        Filter with `types` (comma-separated event types) and `session` (one session
        id). To resume after a disconnect, reconnect with `since={lastEventId}` (the
        `id` of the last event you processed); the gateway replays the events you
        missed, then continues live. This is how a dashboard reconnects after its
        short-lived JWT expires, without losing events.
      operationId: events
      parameters:
        - name: types
          in: query
          schema: { type: string }
          description: Comma-separated event type filter.
        - name: session
          in: query
          schema: { type: string }
          description: Restrict to one session id.
      responses:
        "200":
          description: A live NDJSON stream — one Event JSON object per line, plus periodic ping lines.
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/Event" }
        "401": { $ref: "#/components/responses/Error" }

  # --------------------------------------------------------------- Webhooks
  /webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      description: >-
        List the webhook endpoints configured for the caller's organization. Requires
        the `manage` capability. Use `limit` and `cursor` to page; the response carries
        the next cursor.
      operationId: listWebhooks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: A page of webhooks.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookPage" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      tags: [Webhooks]
      summary: Create a webhook
      description: >-
        Register a webhook endpoint for the caller's organization. Requires the `manage`
        capability. When a matching event fires, the gateway POSTs the event envelope
        (the same JSON shape as the `/events` stream) to `url`. Set `events` to the
        event types to receive (`["*"]` for all) and `sessionId` to scope to one session
        (null = all of the organization's sessions).

        If you set a `secret`, the gateway signs each POST: it sends the lowercase-hex
        HMAC-SHA512 of the exact request body in the `X-Webhook-Hmac` header (with
        `X-Webhook-Hmac-Algorithm: sha512`). Recompute it on your end with the same
        secret to confirm the request really came from the gateway. Every POST also
        carries `X-Webhook-Request-Id` (the event id, so you can drop duplicate
        redeliveries) and `X-Webhook-Timestamp` (epoch milliseconds).

        Failed deliveries (a non-2xx response or a connection error) are retried on the
        `retryPolicy` schedule — by default exponential backoff (2s, 4s, 8s, …) for up
        to 15 attempts, after which the delivery is given up on. The secret is stored
        encrypted and never returned in responses.
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookRequest" }
      responses:
        "201":
          description: The created webhook.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
        "400": { $ref: "#/components/responses/Error" }

  /webhooks/{id}:
    parameters: [ { $ref: "#/components/parameters/ID" } ]
    get:
      tags: [Webhooks]
      summary: Get a webhook
      description: >-
        Fetch one webhook by `id`. Requires the `manage` capability, and the webhook
        must belong to the caller's organization. The secret is never returned.
      operationId: getWebhook
      responses:
        "200":
          description: The webhook.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [Webhooks]
      summary: Update a webhook
      description: >-
        Update the webhook identified by `id` (url, events, session scope, secret,
        custom headers, retry policy, or active flag). Requires the `manage` capability,
        and the webhook must belong to the caller's organization. Send a new `secret`
        to rotate it; omit it to leave the stored secret unchanged.
      operationId: updateWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookRequest" }
      responses:
        "200":
          description: The updated webhook.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      description: >-
        Delete the webhook identified by `id`. Requires the `manage` capability, and the
        webhook must belong to the caller's organization. After deletion no further
        events are delivered to its url.
      operationId: deleteWebhook
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/Error" }

  # ------------------------------------------------------------------ Admin
  /admin/sessions:
    get:
      tags: [Admin]
      summary: List sessions across all organizations (super_admin)
      description: >-
        List WhatsApp sessions across every organization, for platform oversight.
        Restricted to a platform super_admin — it requires a JWT carrying the
        super_admin platform role; api-keys and ordinary org roles are rejected with
        403. Unlike the org-scoped session list, this is not limited to one
        organization. Use `limit` and `cursor` to page.
      operationId: adminListSessions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: A page of sessions across all organizations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionPage" }
        "403": { $ref: "#/components/responses/Error" }
  /admin/sessions/{session}:backfill:
    post:
      tags: [Admin]
      summary: Start a session data backfill (super_admin)
      description: >-
        Starts an in-memory background backfill for one WhatsApp session. Only
        one backfill may run per session at a time; concurrent requests for the
        same session return 409. The job pulls currently supported direct
        WhatsApp data (cached contacts and joined group metadata/members).
        Ordinary chat history is received through WhatsApp HistorySync events
        rather than a generic "fetch all messages" API.
      operationId: adminStartSessionBackfill
      parameters:
        - $ref: "#/components/parameters/Session"
      responses:
        "202":
          description: Backfill accepted and running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackfillJob" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /admin/sessions/{session}/backfill:
    get:
      tags: [Admin]
      summary: Get the current or latest session backfill job
      operationId: adminSessionBackfillStatus
      parameters:
        - $ref: "#/components/parameters/Session"
      responses:
        "200":
          description: The current or latest backfill job for this session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackfillJob" }
        "404": { $ref: "#/components/responses/Error" }

# ===================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Send one `Authorization: Bearer <token>` header. The gateway accepts
        two kinds of token here and tries each in turn. The first is a login
        token (a JWT) the frontend mints for a signed-in person; the gateway
        checks its signature against the frontend's public keys and reads the
        person's organization and role from it. The second is an api-key for a
        script or service (prefixed `wa_`), which carries a fixed set of gateway
        permissions. The `bearerFormat: JWT` label above describes the person
        token; api-keys work on this same header. An api-key may instead be sent
        in the `x-api-key` header.
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Alternative transport for a better-auth api-key (prefix `wa_`), for
        clients that cannot set an `Authorization` header. Equivalent to
        sending the api-key as a Bearer token.

  parameters:
    Session:
      name: session
      in: path
      required: true
      description: The WhatsApp session id (a session is one attached WhatsApp number).
      schema: { type: string }
    ID:
      name: id
      in: path
      required: true
      description: Resource id in the path (e.g. a webhook id).
      schema: { type: string }
    MessageID:
      name: mid
      in: path
      required: true
      description: The WhatsApp message id (the per-message stable id assigned by WhatsApp).
      schema: { type: string }
    ChatID:
      name: cid
      in: path
      required: true
      description: >-
        The chat's JID. A JID (Jabber ID) is WhatsApp's address for a
        conversation or user — e.g. `123...@s.whatsapp.net` for a direct
        chat or `123...@g.us` for a group.
      schema: { type: string }
    GroupID:
      name: gid
      in: path
      required: true
      description: The group's JID (ends in `@g.us`).
      schema: { type: string }
    JID:
      name: jid
      in: path
      required: true
      description: A WhatsApp JID — the address of a user, group, or channel.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return on one page (clamped to 1–200; defaults to 50).
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      name: cursor
      in: query
      required: false
      description: >-
        Page cursor. Pass the `nextCursor` value from the previous response to
        fetch the next page. The value is opaque — treat it as a token, do not
        parse it. Omit it to get the first page.
      schema: { type: string }

  responses:
    Error:
      description: An error, returned in the standard error envelope (see the Error schema).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    SendResultOK:
      description: The message was accepted; the body reports the WhatsApp message id and its current status.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SendResult" }

  schemas:
    # --- envelopes ---
    Error:
      type: object
      description: >-
        The shape every error response uses. The HTTP status code says what
        kind of failure it was; this body carries a stable machine-readable
        `code`, a human `message`, and optional `details`.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: >-
                Stable error code, independent of the HTTP status. `rate_limited`
                = too many requests; `not_found` = no such resource (or it belongs
                to another organization); `unauthorized` = missing/invalid
                credentials; `forbidden` = authenticated but lacks the required
                permission; `validation_error` = bad request input; `conflict` =
                a duplicate or state clash; `not_implemented` = the feature is
                stubbed in this build (returned as HTTP 501); `internal` = an
                unexpected server error.
              enum:
                - rate_limited
                - not_found
                - unauthorized
                - forbidden
                - validation_error
                - conflict
                - not_implemented
                - internal
            message: { type: string, description: Human-readable explanation of what went wrong. }
            details:
              type: object
              description: Optional extra context about the error (e.g. which field failed validation).
              additionalProperties: true

    PageMeta:
      type: object
      description: Pagination fields shared by every list response.
      properties:
        nextCursor:
          type: [string, "null"]
          description: >-
            Pass this back as the `cursor` query parameter to fetch the next
            page. It is null (or absent) when there are no more items.

    # --- sessions ---
    CreateSessionRequest:
      type: object
      description: Fields for creating a new WhatsApp session (an attached number).
      properties:
        label: { type: string, description: Optional human-friendly name for the session. }
        start: { type: boolean, description: "If true, start the session right away (otherwise it is created stopped)." }
        autoRead: { type: boolean, description: "If true, mark incoming messages as read automatically." }
        presenceTyping: { type: boolean, description: "If true, send a \"typing…\" presence indicator while sending." }
    WASession:
      type: object
      description: >-
        One attached WhatsApp number. Each session is owned by one organization
        and runs on one gateway. The `gateway` object (when present) describes
        which gateway holds this session, so a dashboard can show where each
        session lives when there is more than one gateway.
      required: [id, organizationId, gatewayId, status, isAdminSession, autoRead, presenceTyping, ratePerMin, ratePerHour, createdAt, updatedAt]
      properties:
        id: { type: string, description: The session id (a ULID). }
        organizationId: { type: string, description: Id of the organization that owns this session. }
        createdByUserId: { type: string, description: Id of the user who created the session (kept for audit). }
        gatewayId: { type: string, description: Id of the gateway that holds this session's WhatsApp keys and connection. }
        gateway:
          $ref: "#/components/schemas/Gateway"
          description: The owning gateway's details (label, online status, base URL), for showing where the session runs.
        label: { type: string, description: Human-friendly name for the session. }
        status:
          type: string
          description: >-
            Where the session is in its lifecycle. `starting` = connecting (also
            used after a transient disconnect, since the gateway reconnects);
            `scan_qr_code` = waiting for the QR code to be scanned to pair;
            `working` = connected and usable; `failed` = the connection broke
            (e.g. replaced by another device); `stopped` = deliberately stopped;
            `logged_out` = unpaired on the phone, needs a fresh QR scan.
          enum: [starting, scan_qr_code, working, failed, stopped, logged_out]
        waJid: { type: string, description: "The session's own WhatsApp JID, set once the number is paired." }
        waLid: { type: string, description: "The session's linked-device id (LID), WhatsApp's privacy-preserving per-device address." }
        phoneNumber: { type: string, description: The paired phone number in plain digits. }
        isAdminSession: { type: boolean, description: True if this is the gateway's configured admin session (WHATSAPP_ADMIN_NUMBER). }
        autoRead: { type: boolean, description: Whether incoming messages are marked read automatically. }
        presenceTyping: { type: boolean, description: Whether a "typing…" indicator is sent while sending. }
        ratePerMin: { type: integer, description: Send rate limit per minute for this session. }
        ratePerHour: { type: integer, description: Send rate limit per hour for this session. }
        lastConnectedAt: { type: integer, format: int64, description: "When the session last connected, in epoch milliseconds." }
        createdAt: { type: integer, format: int64, description: "When the session was created, in epoch milliseconds." }
        updatedAt: { type: integer, format: int64, description: "When the session was last updated, in epoch milliseconds." }
    Gateway:
      type: object
      description: >-
        One gateway instance. A deployment usually has a single gateway;
        more are added only when sharding sessions across machines. This is
        attached to session responses so a dashboard knows where a session runs.
      required: [id, status]
      properties:
        id: { type: string, description: The gateway's id. }
        label: { type: string, description: Human-friendly name for the gateway. }
        status:
          type: string
          description: Whether the gateway is currently reachable, based on its most recent heartbeat.
          enum: [online, offline]
        baseUrl: { type: string, description: "The gateway's public base URL, where clients reach it." }
        lastSeenAt: { type: integer, format: int64, description: "When the gateway last sent a heartbeat, in epoch milliseconds." }
    SessionPage:
      type: object
      description: One page of sessions, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The sessions on this page.
              items: { $ref: "#/components/schemas/WASession" }
    SessionMe:
      type: object
      description: The WhatsApp account this session is paired with.
      properties:
        jid: { type: string, description: The account's own WhatsApp JID. }
        lid: { type: string, description: The account's linked-device id (LID). }
        pushName: { type: string, description: The display name the account shows to others. }
        phoneNumber: { type: string, description: The paired phone number in plain digits. }
    BackfillJob:
      type: object
      required: [id, sessionId, organizationId, status, contacts, groups, groupMembers, startedAt]
      properties:
        id: { type: string, description: The backfill job id. }
        sessionId: { type: string, description: The session being backfilled. }
        organizationId: { type: string, description: The session owner's organization id. }
        status: { type: string, enum: [running, succeeded, failed], description: Current job state. }
        contacts: { type: integer, description: Number of contacts persisted. }
        groups: { type: integer, description: Number of groups persisted. }
        groupMembers: { type: integer, description: Number of group memberships persisted. }
        error: { type: string, description: Failure message when status is failed. }
        startedAt: { type: integer, format: int64, description: "When the job started, in epoch milliseconds." }
        finishedAt: { type: integer, format: int64, description: "When the job finished, in epoch milliseconds." }
    QRCode:
      type: object
      description: The pairing QR code to display so the user can link their phone.
      properties:
        code: { type: string, description: The QR payload string; render it as a QR image for the user to scan. }

    # --- messages ---
    SendRequest:
      type: object
      required: [type, to]
      description: >-
        One outgoing message. `type` selects which other fields apply (e.g.
        `text` uses `text`; `location` uses `latitude`/`longitude`/`name`;
        `poll` uses `name`/`options`/`selectableCount`). Media types
        (image/video/audio/document/sticker) are not implemented in this build
        and return 501.
      properties:
        type:
          type: string
          description: Which kind of message to send. Determines which other fields are used.
          enum: [text, poll, location, contact, image, video, audio, document, sticker]
        to: { type: string, description: "The recipient's JID (a user JID for a direct message, a group JID for a group)." }
        text: { type: string, description: "The message text (for type text)." }
        replyTo: { type: string, description: The id of the message this one quotes/replies to. }
        mentions:
          type: array
          description: JIDs to @-mention in the message.
          items: { type: string }
        name: { type: string, description: "For a poll, the poll question; for a location, the place label." }
        options:
          type: array
          description: The poll's answer options (for poll messages).
          items: { type: string }
        selectableCount: { type: integer, description: How many options a voter may pick in the poll (1 = single choice). }
        latitude: { type: number, description: Latitude of the shared location. }
        longitude: { type: number, description: Longitude of the shared location. }
        contact: { $ref: "#/components/schemas/ContactCard" }
    ContactCard:
      type: object
      description: A contact to share (for contact messages).
      properties:
        name: { type: string, description: The contact's display name. }
        phone: { type: string, description: The contact's phone number. }
        vcard: { type: string, description: "A full vCard string; if set, it is sent verbatim instead of building one from name/phone." }
    SendResult:
      type: object
      description: The outcome of a send request.
      properties:
        messageId: { type: string, description: The WhatsApp message id assigned to the sent message. }
        status:
          type: string
          description: >-
            Delivery state of the message. `pending` = queued/not yet
            confirmed; `sent` = handed to WhatsApp; `delivered` = reached the
            recipient's device; `read` = opened; `played` = voice/video note
            played; `failed` = could not be sent.
          enum: [pending, sent, delivered, read, played, failed]
        timestamp: { type: integer, format: int64, description: "When the message was sent, in epoch milliseconds." }
    Message:
      type: object
      description: A stored message in a chat (sent or received).
      properties:
        id: { type: string, description: The WhatsApp message id. }
        chatJid: { type: string, description: JID of the chat this message belongs to. }
        senderJid: { type: string, description: JID of whoever sent the message. }
        senderLid: { type: string, description: "LID of whoever sent the message. In group chats the sender is identified by LID; senderJid is often absent." }
        senderName: { type: string, description: "Resolved display name of the sender, when known. Especially useful in group chats to label each message's author." }
        direction: { type: string, description: "`in` = received by this session; `out` = sent by this session.", enum: [in, out] }
        type: { type: string, description: "The message kind (e.g. text, image, location, poll, reaction, system)." }
        body: { type: string, description: "The text content or caption, when the message has one." }
        status:
          type: string
          description: >-
            Delivery state. `pending`, `sent`, `delivered`, `read`, `played`,
            or `failed` — same meanings as on a send result. Mainly meaningful
            for outgoing messages.
          enum: [pending, sent, delivered, read, played, failed]
        timestamp: { type: integer, format: int64, description: "When the message was sent or received, in epoch milliseconds." }
    MessagePage:
      type: object
      description: One page of messages, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The messages on this page.
              items: { $ref: "#/components/schemas/Message" }

    # --- chats ---
    Chat:
      type: object
      description: A conversation this session is part of.
      properties:
        jid: { type: string, description: The chat's JID. }
        type: { type: string, description: "Kind of chat. `dm` = one-to-one; `group`; `newsletter` = a channel; `broadcast` = a broadcast list; `status` = the status feed.", enum: [dm, group, newsletter, broadcast, status] }
        name: { type: string, description: The chat's display name (contact name or group subject). }
        unreadCount: { type: integer, description: Number of unread messages in this chat. }
        archived: { type: boolean, description: Whether the chat is archived. }
        pinned: { type: boolean, description: Whether the chat is pinned to the top. }
        mutedUntil: { type: integer, format: int64, description: Muted until this time (epoch milliseconds); absent if not muted. }
        lastMessageAt: { type: integer, format: int64, description: "When the most recent message arrived, in epoch milliseconds." }
    ChatPage:
      type: object
      description: One page of chats, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The chats on this page.
              items: { $ref: "#/components/schemas/Chat" }
    UpdateChatRequest:
      type: object
      description: Fields to change on a chat. Omit a field to leave it unchanged.
      properties:
        archived: { type: boolean, description: Set the chat's archived state. }
        pinned: { type: boolean, description: Set the chat's pinned state. }
        mutedUntil: { type: integer, format: int64, description: Mute the chat until this time (epoch milliseconds). }
        unmute: { type: boolean, description: "If true, unmute the chat (clears any mute)." }

    # --- contacts ---
    Contact:
      type: object
      description: A person this session has encountered (the Contacts feature).
      properties:
        lid: { type: string, description: "The contact's linked-device id (LID) — WhatsApp's privacy-preserving address, used as the stable key for a contact." }
        phoneNumber: { type: string, description: "The contact's phone number, when known." }
        name: { type: string, description: "The contact's saved name, when known." }
        pushName: { type: string, description: The display name the contact set for themselves. }
        source: { type: string, description: "Where this session first saw the contact. `dm` = in a direct chat; `group` = in a group.", enum: [dm, group] }
    ContactPage:
      type: object
      description: One page of contacts, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The contacts on this page.
              items: { $ref: "#/components/schemas/Contact" }
    ContactDetail:
      type: object
      description: A contact plus where they show up — whether there is a direct chat, and which groups they share with this session.
      properties:
        identity: { $ref: "#/components/schemas/Contact" }
        dm: { type: boolean, description: True if a direct chat with this contact exists. }
        groups:
          type: array
          description: Groups this contact and the session share.
          items:
            type: object
            properties:
              jid: { type: string, description: The group's JID. }
              name: { type: string, description: The group's name. }
              nickname: { type: string, description: "The contact's display name within this group, if set." }
              role: { type: string, description: "The contact's role in the group. `member`; `admin`; `superadmin` = the group creator.", enum: [member, admin, superadmin] }
              lastSeen: { type: integer, format: int64, description: "When the contact was last seen in this group, in epoch milliseconds." }
    OnWhatsApp:
      type: object
      description: The result of checking whether a phone number is on WhatsApp.
      properties:
        query: { type: string, description: The phone number that was checked. }
        jid: { type: string, description: "The WhatsApp JID for the number, if it is on WhatsApp." }
        isIn: { type: boolean, description: True if the number has a WhatsApp account. }
        verifiedName: { type: string, description: "The verified business name, for official business accounts." }
    ProfilePicture:
      type: object
      description: A contact's or group's profile picture.
      properties:
        url: { type: string, description: URL of the picture image. }
        id: { type: string, description: "The picture's id; changes when the picture changes, so it can be used for caching." }
        type: { type: string, description: The picture variant (e.g. full image vs. preview thumbnail). }

    # --- groups ---
    GroupInfo:
      type: object
      description: A WhatsApp group and its members.
      properties:
        jid: { type: string, description: The group's JID. }
        subject: { type: string, description: The group's name (its subject). }
        description: { type: string, description: The group's description text. }
        owner: { type: string, description: JID of the group's owner/creator. }
        announce: { type: boolean, description: "If true, only admins can post (announcement group)." }
        locked: { type: boolean, description: "If true, only admins can edit the group's info (name, description, icon)." }
        participants:
          type: array
          description: The group's members.
          items: { $ref: "#/components/schemas/GroupMember" }
    GroupMember:
      type: object
      description: One member of a group.
      properties:
        jid: { type: string, description: The member's JID. }
        nickname: { type: string, description: "The member's display name within this group, if set." }
        role: { type: string, description: "`member`; `admin`; `superadmin` = the group creator.", enum: [member, admin, superadmin] }
    GroupSettings:
      type: object
      description: Group settings to change. Omit a field to leave it unchanged.
      properties:
        subject: { type: string, description: New group name. }
        description: { type: string, description: New group description. }
        announce: { type: boolean, description: "If true, restrict posting to admins." }
        locked: { type: boolean, description: "If true, restrict editing the group's info to admins." }
    GroupPage:
      type: object
      description: One page of groups, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The groups on this page.
              items: { $ref: "#/components/schemas/GroupInfo" }

    # --- webhooks ---
    RetryPolicy:
      type: object
      description: How failed webhook deliveries are retried.
      properties:
        policy: { type: string, description: "Backoff strategy. `exponential` doubles the delay each attempt; any other value uses a constant delay.", example: exponential }
        delaySeconds: { type: integer, description: "Base delay before retrying. For exponential, the delay is delaySeconds × 2^(attempt-1). Defaults to 2." }
        attempts: { type: integer, description: Maximum number of attempts before the delivery is given up (dead-lettered). Defaults to 15. }
    WebhookRequest:
      type: object
      description: Fields for creating or updating a webhook.
      properties:
        sessionId: { type: string, description: Deliver only events from this session. Null/omitted means all of the organization's sessions. }
        url: { type: string, description: The HTTPS endpoint that receives the event POSTs. }
        events:
          type: array
          description: Event types to deliver. Use ["*"] to receive every event; an empty list receives none.
          items: { type: string }
        secret: { type: string, description: "If set, each delivery is signed with HMAC-SHA512 over the body, in the X-Webhook-Hmac header, so the receiver can verify it came from the gateway." }
        customHeaders:
          type: object
          description: Extra HTTP headers to send with each delivery (applied last, so they can override the defaults).
          additionalProperties: { type: string }
        retryPolicy: { $ref: "#/components/schemas/RetryPolicy" }
        active: { type: boolean, description: Whether the webhook is enabled. Inactive webhooks receive nothing. }
    Webhook:
      type: object
      description: A configured webhook (the secret is never returned).
      properties:
        id: { type: string, description: The webhook's id. }
        organizationId: { type: string, description: Id of the organization that owns the webhook. }
        sessionId: { type: string, description: The session this webhook is scoped to; null means all of the organization's sessions. }
        url: { type: string, description: The HTTPS endpoint that receives the event POSTs. }
        events:
          type: array
          description: Event types delivered to this webhook (["*"] means all).
          items: { type: string }
        customHeaders:
          type: object
          description: Extra HTTP headers sent with each delivery.
          additionalProperties: { type: string }
        retryPolicy: { $ref: "#/components/schemas/RetryPolicy" }
        active: { type: boolean, description: Whether the webhook is enabled. }
        createdAt: { type: integer, format: int64, description: "When the webhook was created, in epoch milliseconds." }
        updatedAt: { type: integer, format: int64, description: "When the webhook was last updated, in epoch milliseconds." }
    WebhookPage:
      type: object
      description: One page of webhooks, plus the cursor for the next page.
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - properties:
            data:
              type: array
              description: The webhooks on this page.
              items: { $ref: "#/components/schemas/Webhook" }

    # --- events ---
    Event:
      type: object
      description: >-
        One event from the gateway. The same shape is delivered two ways: as one
        JSON object per line on the event stream (NDJSON — newline-delimited
        JSON), and as the body of each webhook POST.
      required: [schema, id, event, session, organization, timestamp, payload]
      properties:
        schema: { type: string, description: "Envelope schema version, so consumers can adapt if the shape changes.", example: v1 }
        id: { type: string, description: "Unique event id. Webhooks repeat it in X-Webhook-Request-Id so receivers can drop duplicate redeliveries.", example: "evt_01J9..." }
        event:
          type: string
          description: The event type, e.g. message, session.status, group.update.
        session: { type: string, description: Id of the session the event came from. }
        organization: { type: string, description: Id of the organization that owns the session. }
        timestamp: { type: integer, format: int64, description: "When the event happened, in epoch milliseconds." }
        payload: { type: object, description: "The event-type-specific body. Its fields depend on the event type.", additionalProperties: true }
