              - Maybe
          items:
            type: string
          type:
            - array
            - "null"
        pollEndTime:
          description: Optional poll closing time as epoch milliseconds. Used for type poll when WhatsApp supports poll end times.
          examples:
            - 1719662400000
          format: int64
          type: integer
        pollHideVotes:
          description: When true, ask WhatsApp to hide participant names in the poll vote list. Used for type poll.
          examples:
            - true
          type: boolean
        replyTo:
          description: Id of the message this one quotes/replies to (a wa_message_id). Optional.
          examples:
            - 3EB0C431C26A1916E001
          type: string
        selectableCount:
          description: How many options a voter may pick in the poll (1 = single choice). Used for type poll.
          examples:
            - 1
          format: int64
          type: integer
        text:
          description: The message text. Required for type text; ignored otherwise.
          examples:
            - Hello there!
          type: string
        to:
          description: "The recipient's JID: a user JID for a direct message (e.g. 6281234567890@s.whatsapp.net) or a group JID for a group (e.g. 120363021234567890@g.us). Required."
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        type:
          description: Which kind of message to send. Determines which other fields are required. **text** uses text (+ optional replyTo/mentions); **poll** uses name (question) + options + selectableCount; **location** uses latitude + longitude + optional name (label); **contact** uses contact. The media types **image**, **video**, **audio**, **document**, **sticker** use media (a base64 file or HTTP(S) URL + optional caption/filename, replyTo, mentions).
          enum:
            - text
            - poll
            - location
            - contact
            - image
            - video
            - audio
            - document
            - sticker
          examples:
            - text
          type: string
      required:
        - type
        - to
      type: object
    SendResult:
      additionalProperties: false
      properties:
        mode:
          type: string
        outboxId:
          type: string
        replayed:
          type: boolean
        status:
          type: string
        timestamp:
          format: int64
          type: integer
        waMessageId:
          type: string
      required:
        - mode
      type: object
    SessionStatusEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - session.status
          examples:
            - session.status
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/SessionStatusPayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    SessionStatusPayload:
      additionalProperties: false
      properties:
        status:
          description: "New session status. One of: starting (connecting), scan_qr_code (waiting for a QR scan or pairing code), working (connected and ready to send/receive), failed (connection failed; will retry), stopped (intentionally stopped), logged_out (the WhatsApp account unlinked the device — must re-pair)."
          enum:
            - starting
            - scan_qr_code
            - working
            - failed
            - stopped
            - logged_out
          examples:
            - working
          type: string
      required:
        - status
      type: object
    SetPresenceInputBody:
      additionalProperties: false
      properties:
        state:
          description: "Presence mode: online or offline. Any other value returns validation_error (400). This is account-wide; use chat presence endpoint for typing/recording indicators."
          enum:
            - online
            - offline
          examples:
            - online
          type: string
      type: object
    UpdateChatInputBody:
      additionalProperties: false
      properties:
        archived:
          description: Set archived state.
          examples:
            - true
          type: boolean
        mutedUntil:
          description: Mute until Unix epoch milliseconds.
          examples:
            - 1735689600000
          format: int64
          type: integer
        pinned:
          description: Set pinned state.
          examples:
            - false
          type: boolean
        unmute:
          description: Set true to clear mute.
          examples:
            - false
          type: boolean
      type: object
    UpdateGroupInputBody:
      additionalProperties: false
      properties:
        announce:
          description: When true, only admins can post.
          examples:
            - true
          type: boolean
        description:
          description: New description.
          examples:
            - Sprint planning and on-call coordination.
          type: string
        locked:
          description: When true, only admins can edit group info.
          examples:
            - false
          type: boolean
        subject:
          description: New subject.
          examples:
            - Engineering Team (renamed)
          type: string
      type: object
    VoteInputBody:
      additionalProperties: false
      properties:
        chat:
          description: Chat JID of the poll.
          examples:
            - 120363012345678901@g.us
          type: string
        options:
          description: Complete list of selected options. Send empty list to clear vote.
          examples:
            - - Pizza
              - Sushi
          items:
            type: string
          type:
            - array
            - "null"
        sender:
          description: Poll sender JID.
          examples:
            - ""
          type: string
      type: object
    WASession:
      additionalProperties: false
      properties:
        autoRead:
          description: Whether incoming messages are automatically marked read (blue ticks) before the session acts on them.
          examples:
            - false
          type: boolean
        createdAt:
          description: When the session was created, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        createdByUserId:
          description: Id of the better-auth user who created the session, kept for audit. Optional; null when created by a non-user principal (e.g. an API key) or unknown.
          examples:
            - user_01J9DEF...
          type: string
        gatewayId:
          description: Id of the gateway that holds this session's WhatsApp keystore and live connection. The session is pinned here; a dashboard uses it (and the embedded gateway object on responses that include it) to show where the session runs.
          examples:
            - gw-sg-1
          type: string
        id:
          description: The session id (a ULID). Stable identifier for the attached WhatsApp number; used in all per-session routes.
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        isAdminSession:
          description: True if this is the gateway's configured admin session (the WHATSAPP_ADMIN_NUMBER). The admin session has extra privileges such as triggering live-data backfills.
          examples:
            - false
          type: boolean
        label:
          description: Human-friendly name for the session. Optional; null when unset.
          examples:
            - Support line
          type: string
        lastConnectedAt:
          description: When the session last established a live WhatsApp connection, in epoch milliseconds (UTC). Optional; null if it has never connected.
          examples:
            - 1719662400000
          format: int64
          type: integer
        organizationId:
          description: Id of the better-auth organization that owns this session. All access to the session is scoped to this org.
          examples:
            - org_01J9ABC...
          type: string
        phoneNumber:
          description: The paired phone number in plain digits (E.164 without +). Optional; null before pairing.
          examples:
            - "6281234567890"
          type: string
        presenceTyping:
          description: Whether a "typing…" presence indicator is sent to the recipient while a message is being sent.
          examples:
            - true
          type: boolean
        ratePerHour:
          description: Outbound send rate limit for this session, in messages per hour. Sends exceeding the limit are throttled.
          examples:
            - 600
          format: int64
          type: integer
        ratePerMin:
          description: Outbound send rate limit for this session, in messages per minute. Sends exceeding the limit are throttled.
          examples:
            - 20
          format: int64
          type: integer
        status:
          description: "Where the session is in its lifecycle. **starting** = connecting (also used after a transient disconnect, since the gateway auto-reconnects); **scan_qr_code** = waiting for the pairing QR code to be scanned (fetch it via the QR endpoint); **working** = connected and usable for sending/receiving; **failed** = the connection broke (e.g. the number was linked to another device); **stopped** = deliberately stopped by an operator; **logged_out** = unpaired on the phone, requires a fresh QR scan to recover. Typical pairing path: starting → scan_qr_code → working."
          enum:
            - starting
            - scan_qr_code
            - working
            - failed
            - stopped
            - logged_out
          examples:
            - working
          type: string
        updatedAt:
          description: When the session was last updated, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        waJid:
          description: The session's own WhatsApp JID, set once the number is paired. Optional; null before pairing.
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        waLid:
          description: The session's linked-device id (LID) — WhatsApp's privacy-preserving per-device address. Optional; null before pairing.
          examples:
            - 205227043110953@lid
          type: string
      required:
        - id
        - organizationId
        - gatewayId
        - status
        - isAdminSession
        - autoRead
        - presenceTyping
        - ratePerMin
        - ratePerHour
        - createdAt
        - updatedAt
      type: object
    Webhook:
      additionalProperties: false
      properties:
        active:
          description: Whether the webhook is enabled. An inactive webhook receives no deliveries.
          examples:
            - true
          type: boolean
        createdAt:
          description: When the webhook was created, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        customHeaders:
          additionalProperties:
            type: string
          description: Extra HTTP headers sent with each delivery. Applied last, so they can override the gateway's default headers. Optional.
          examples:
            - X-Tenant: acme
          type: object
        events:
          description: "Event types delivered to this webhook. Use [\"*\"] to receive every event; an empty list receives none. Example values: \"message\", \"session.status\", \"poll.vote\", \"group.update\"."
          examples:
            - - message
              - poll.vote
          items:
            type: string
          type:
            - array
            - "null"
        id:
          description: The webhook's id.
          examples:
            - wh_01J9...
          type: string
        organizationId:
          description: Id of the organization that owns this webhook.
          examples:
            - org_01J9ABC...
          type: string
        retryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
          description: How failed deliveries to this webhook are retried (backoff strategy, base delay, max attempts).
        sessionId:
          description: "The session this webhook is scoped to: only events from this session are delivered. Optional; null means all of the organization's sessions."
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        updatedAt:
          description: When the webhook was last updated, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        url:
          description: The HTTPS endpoint that receives event POSTs (the Event envelope as the request body).
          examples:
            - https://example.com/webhooks/wa
          type: string
      required:
        - id
        - organizationId
        - url
        - events
        - retryPolicy
        - active
        - createdAt
        - updatedAt
      type: object
    WebhookBody:
      additionalProperties: false
      properties:
        active:
          description: Whether the webhook is enabled. An inactive (false) webhook is kept but receives no deliveries. Defaults to enabled when omitted on create.
          examples:
            - true
          type: boolean
        customHeaders:
          additionalProperties:
            type: string
          description: Extra HTTP headers attached to every delivery POST. Applied last, so they can override the gateway's default headers. Use for static auth tokens or routing hints the receiver requires.
          examples:
            - X-Tenant: acme
          type: object
        events:
          description: Event types to deliver to this webhook. Use ["*"] to receive every event type; an explicit list (e.g. ["message.received", "session.connected"]) delivers only those types; an empty list delivers nothing. See the event catalog for the full set of type names.
          examples:
            - - "*"
          items:
            type: string
          type:
            - array
            - "null"
        retryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
          description: "How failed deliveries (non-2xx response or connection error) are retried. Omit to use the gateway default: exponential backoff with a 2s base delay (2s, 4s, 8s, …) for up to 15 attempts, after which the delivery is given up (dead-lettered)."
        secret:
          description: "Plaintext HMAC signing secret. When set, the gateway signs each delivery: it sends the lowercase-hex HMAC-SHA512 of the exact raw request body in the X-Webhook-Hmac header (alongside X-Webhook-Hmac-Algorithm: sha512), so the receiver can recompute it with the same secret and confirm authenticity. Stored encrypted at rest and **never returned** in any response. On update: send a new value to rotate the secret; omit the field to leave the stored secret unchanged."
          examples:
            - whsec_3f9a...redacted
          type: string
        sessionId:
          description: "Scope this webhook to a single session: only events produced by that session are delivered. Omit or set to null to receive events from **all** of the caller organization's sessions. Must reference a session owned by the caller's organization."
          examples:
            - 01HHX5...
          type: string
        url:
          description: The HTTPS endpoint that receives the delivery POSTs. Required on create (validated server-side; a missing or malformed value yields a 422 "validation_error"). The gateway POSTs the event envelope (the same JSON shape pushed over the realtime WebSocket) to this URL as the request body.
          examples:
            - https://example.com/hooks/whatsapp
          type: string
      type: object
  securitySchemes:
    apiKeyHeader:
      description: Send an api-key here when your client cannot set `Authorization`. It is the same as sending the api-key as a Bearer token.
      in: header
      name: x-api-key
      type: apiKey
    bearerAuth:
      bearerFormat: JWT
      description: "Send `Authorization: Bearer <token>`. The token can be a login JWT from the frontend or an api-key for a script. JWT access comes from the person's organization role. Api-key access comes from the permissions saved on the key."
      scheme: bearer
      type: http
info:
  description: |-
    REST API for the WhatsApp gateway. Every session (one attached WhatsApp number)
    belongs to one organization, and a caller only ever sees the sessions of the
    organization it is acting as. This document is the contract of record — it is
    **generated from the gateway's Go types** and served as-is at
    `/api/v1/openapi.yaml` by the central router (there is no Swagger UI).

    **One API URL.** Clients call the router. The router checks the token, finds the
    gateway that owns the target session, and forwards the request. Clients never
    need to know which gateway is holding a WhatsApp number.

    **Base path.** All endpoints below are under `/api/v1`, except the
    unauthenticated probes `/healthz`, `/readyz`, and `/openapi.yaml`.

    **Authenticating.** Send one `Authorization: Bearer <token>` header. The
    token is one of two kinds, and which one you send decides what you can do:

    - A **JWT** — a signed login token issued by the frontend for a logged-in person.
      The router verifies the signature against the frontend's public keys (JWKS).
      What the person can do follows their role in the organization: an owner or admin
      can do everything; a member can read and send.
    - An **api-key** — a long-lived token for a script or service. It may also be sent
      in an `x-api-key` header. Each key is granted some mix of four
      permissions — `read`, `send`, `manage`, `events` — and can only call
      endpoints those permissions allow.

    Creating users, organizations, and api-keys all happen in the frontend, not here.

    **Permissions per endpoint.** Each endpoint requires one capability: `read` (GET data), `send` (send messages, post status, set
    presence, run group operations), `manage` (create/start/stop sessions,
    configure webhooks), or `events` (subscribe to realtime events). A JWT
    grants these from the person's org role; an api-key grants exactly what it was
    given.

    **Errors.** Every error response has the same shape:
    `{ "error": { "code": "...", "message": "...", "details": ... } }`.
    The `code` is a stable string (for example `not_found`, `unauthorized`, `validation_error`, `forbidden`, `rate_limited`, `not_implemented`, `gateway_unavailable`) and is the field to branch on.

    **Pagination.** List endpoints accept `?limit=` and an opaque
    `?cursor=`, and return `{ "data": [ ... ], "nextCursor": "..." }`.
    Pass the returned `nextCursor` back as `?cursor=` for the next
    page; an absent/empty `nextCursor` means there are no more. Treat the
    cursor as opaque.

    **Realtime & webhooks.** Events are delivered two ways with the identical envelope:
    as the body of a webhook `POST`, and as discrete JSON messages over the
    realtime WebSocket on the router. See the **webhooks** section for the typed,
    per-event-type payloads.

    **Not yet implemented in v1.** Some operations return `501 not_implemented`:
    sending media (image, video, audio, document, sticker), posting an image status,
    all channel operations, and approving pending group join requests. Text, poll,
    location, and contact message types do work.
  title: WhatsApp Gateway API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/admin/sessions:
    get:
      description: |-
        Return all sessions across all organizations for platform admins.

        Read-only route.

        Requires a login JWT with role `super_admin`.

        Only login-based super admins are accepted. Api-keys and org roles return `forbidden` (403).

        Returns a flat list of session rows.
      operationId: adminListSessions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWASession"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List sessions across all organizations (super_admin)
      tags:
        - Admin
  /api/v1/admin/sessions/{session}/backfill:
    get:
      description: |-
        Get the active backfill job for a session, or the most recent completed/failed one if none is running.

        Backfill state is in-memory, so restarts clear job history.

        Requires platform super_admin login JWT.

        Errors: `forbidden` (403) and `not_found` (404) if session missing or no job exists.
      operationId: adminSessionBackfillStatus
      parameters:
        - description: Session ID. As super_admin this may belong to any organization.
          in: path
          name: session
          required: true
          schema:
            description: Session ID. As super_admin this may belong to any organization.
            examples:
              - 01HZX9Q2K7
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get the current or latest session backfill job (super_admin)
      tags:
        - Admin
  /api/v1/admin/sessions/{session}:backfill:
    post:
      description: |-
        Start one in-memory backfill job for a single session.

        The job fetches contacts and joined group metadata/members. Chat history is not pulled by backfill.

        Returns **202 Accepted** with job state. Poll `GET /admin/sessions/{session}/backfill` for progress.

        Only one backfill can run per session; existing in-flight jobs return `conflict` (409).

        Requires platform super_admin login JWT. Api-keys and org roles are rejected with `forbidden` (403).

        Errors: `not_found` (404), `conflict` (409), `not_implemented` (501).
      operationId: adminStartSessionBackfill
      parameters:
        - description: Session ID. As super_admin this may belong to any organization.
          in: path
          name: session
          required: true
          schema:
            description: Session ID. As super_admin this may belong to any organization.
            examples:
              - 01HZX9Q2K7
            type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Start a session data backfill (super_admin)
      tags:
        - Admin
  /api/v1/oauth-apps:
    get:
      description: |-
        List Sign in with WhatsApp OAuth applications owned by the caller's organization.

        Requires `read` capability. Results are org-scoped.
      operationId: listOAuthApps
      parameters:
        - description: Opaque cursor returned by the previous page.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque cursor returned by the previous page.
            examples:
              - oac_01J9ZX8K2QHV0M3T6R7P4N5W8C
            type: string
        - description: Maximum number of items to return. Defaults to 50 and is capped at 200.
          explode: false
          in: query
          name: limit
          schema:
            description: Maximum number of items to return. Defaults to 50 and is capped at 200.
            examples:
              - 50
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOAuthApp"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List OAuth applications
      tags:
        - OAuth Apps
    post:
      description: |-
        Create an org-owned Sign in with WhatsApp OAuth application bound to one WhatsApp session.

        Requires `manage` capability. Confidential clients return `clientSecret` exactly once in this response; public clients return no secret.
      operationId: createOAuthApp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OauthAppBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthAppWithSecret"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Create an OAuth application
      tags:
        - OAuth Apps
  /api/v1/oauth-apps/{id}:
    delete:
      description: |-
        Soft-delete an OAuth application and cascade-revoke its grants and refresh tokens immediately.

        Requires `manage` capability. Returns 204 on success.
      operationId: deleteOAuthApp
      parameters:
        - description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
          in: path
          name: id
          required: true
          schema:
            description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
            examples:
              - oac_01J9ZX8K2QHV0M3T6R7P4N5W8C
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Delete an OAuth application
      tags:
        - OAuth Apps
    get:
      description: |-
        Fetch one OAuth application. Cross-organization ids return `not_found` unless the caller is `super_admin`.

        Requires `read` capability.
      operationId: getOAuthApp
      parameters:
        - description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
          in: path
          name: id
          required: true
          schema:
            description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
            examples:
              - oac_01J9ZX8K2QHV0M3T6R7P4N5W8C
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthApp"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get an OAuth application
      tags:
        - OAuth Apps
    patch:
      description: |-
        Patch OAuth application configuration. Redirect URIs and modes are replacement sets; redirect URIs must remain exact absolute HTTPS URLs, with localhost HTTP allowed for development.

        Requires `manage` capability.
      operationId: updateOAuthApp
      parameters:
        - description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
          in: path
          name: id
          required: true
          schema:
            description: OAuth application id. Unknown or cross-organization ids return not_found unless the caller is super_admin.
            examples:
              - oac_01J9ZX8K2QHV0M3T6R7P4N5W8C
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OauthAppPatchBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthApp"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Update an OAuth application
      tags:
        - OAuth Apps
  /api/v1/oauth-apps/{id}/grants:
    get:
      description: |-
        List persistent WhatsApp identity grants for one OAuth application.

        Requires `read` capability.
      operationId: listOAuthAppGrants
      parameters:
        - description: OAuth application id.
          in: path
