  /api/v1/sessions/{session}/chats/{cid}/presence:
    get:
      description: |-
        Subscribe to a contact's live WhatsApp presence and return the current presence snapshot.

        WhatsApp presence is event-driven: this endpoint may return `state: unknown` immediately, then a later `presence.update` event updates the same chat/contact as available or unavailable. Requires `read` capability and a live connected session.

        Errors: `validation_error` for a bad JID, `not_found` if the session is missing, `not_implemented` if the session is not connected, `forbidden` if missing `read`.
      operationId: getChatPresence
      parameters:
        - description: WhatsApp session id. Must belong to the caller organization.
          in: path
          name: session
          required: true
          schema:
            description: WhatsApp session id. Must belong to the caller organization.
            examples:
              - 01HF...
            type: string
        - description: Chat JID (for example 628...@s.whatsapp.net or 120...@g.us).
          in: path
          name: cid
          required: true
          schema:
            description: Chat JID (for example 628...@s.whatsapp.net or 120...@g.us).
            examples:
              - 6281234567890@s.whatsapp.net
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceStatus"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get chat presence
      tags:
        - Chats
        - Presence
    put:
      description: |-
        Send a typing/recording indicator (`state`) to a chat.

        Requires a live connected session.

        Errors: `validation_error` for bad state, `not_found` for session not found, `not_implemented` if session is not connected, `forbidden` if missing `send`.
      operationId: setChatPresence
      parameters:
        - description: WhatsApp session id. Must belong to the caller organization.
          in: path
          name: session
          required: true
          schema:
            description: WhatsApp session id. Must belong to the caller organization.
            examples:
              - 01HF...
            type: string
        - description: Chat JID receiving presence state.
          in: path
          name: cid
          required: true
          schema:
            description: Chat JID receiving presence state.
            examples:
              - 6281234567890@s.whatsapp.net
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatPresenceInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Set chat presence (typing/recording)
      tags:
        - Chats
