  /api/v1/webhooks:
    get:
      description: |-
        List the webhook endpoints configured for the caller's organization. Requires the `manage` capability.

        The response is scoped to the caller's organization — webhooks owned by other organizations are never returned, and secrets are never included.

        This endpoint returns the full set in one page (the response carries an empty `nextCursor`); no pagination parameters are accepted. Errors: `403 forbidden` if the caller lacks the `manage` capability.
      operationId: listWebhooks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhook"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: List webhooks
      tags:
        - Webhooks
    post:
      description: |-
        Register a webhook endpoint for the caller's organization. Requires the `manage` capability.

        When a matching event fires, the gateway sends an HTTP `POST` to `url` whose body is the event envelope — the same JSON shape delivered over the realtime WebSocket. Use `events` to choose the event types to receive (`["*"]` for all) and `sessionId` to scope deliveries to one session (null/omitted = all of the organization's sessions).

        **Signing.** If you set a `secret`, every `POST` is signed: the gateway sends the lowercase-hex HMAC-SHA512 of the exact raw request body in the `X-Webhook-Hmac` header (with `X-Webhook-Hmac-Algorithm: sha512`). Recompute it on your end with the same secret to confirm the request really came from the gateway. The secret is stored encrypted and is never returned in any response.

        **Delivery headers.** Every `POST` also carries `X-Webhook-Request-Id` (the event id — use it to drop duplicate redeliveries) and `X-Webhook-Timestamp` (epoch milliseconds). Any `customHeaders` are applied last and can override the defaults.

        **Retries.** A delivery that returns non-2xx or fails to connect is retried on the `retryPolicy` schedule — by default exponential backoff (2s, 4s, 8s, …) for up to 15 attempts, after which it is given up (dead-lettered).

        On success returns `201` with the created webhook. Errors: `422 validation_error` if the body is malformed (e.g. `url` missing or not a valid URL); `403 forbidden` if the caller lacks the `manage` capability.
      operationId: createWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Create a webhook
      tags:
        - Webhooks
  /api/v1/webhooks/{id}:
    delete:
      description: |-
        Delete the webhook identified by `id`. Requires the `manage` capability, and the webhook must belong to the caller's organization.

        After deletion no further events are delivered to its url; any deliveries already pending retry stop. The deletion is permanent — there is no soft-delete (to pause deliveries without removing the config, set `active: false` via update instead).

        On success returns `204` with an empty body. Errors: `404 not_found` if no webhook with that id is owned by the caller's organization; `403 forbidden` if the caller lacks the `manage` capability.
      operationId: deleteWebhook
      parameters:
        - description: The webhook id. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
          in: path
          name: id
          required: true
          schema:
            description: The webhook id. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
            examples:
              - 01HHX5WEBHOOK...
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Delete a webhook
      tags:
        - Webhooks
    get:
      description: |-
        Fetch one webhook by `id`. Requires the `manage` capability, and the webhook must belong to the caller's organization.

        The signing secret is never returned. Errors: `404 not_found` if no webhook with that id is owned by the caller's organization; `403 forbidden` if the caller lacks the `manage` capability.
      operationId: getWebhook
      parameters:
        - description: The webhook id. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
          in: path
          name: id
          required: true
          schema:
            description: The webhook id. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
            examples:
              - 01HHX5WEBHOOK...
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Get a webhook
      tags:
        - Webhooks
    patch:
      description: |-
        Update the webhook identified by `id` — its `url`, `events`, `sessionId` scope, `secret`, `customHeaders`, `retryPolicy`, or `active` flag. Requires the `manage` capability, and the webhook must belong to the caller's organization.

        **Secret rotation.** Send a new `secret` to rotate it; omit the field to leave the stored secret unchanged. As elsewhere, the secret is never returned.

        On success returns `200` with the updated webhook. Errors: `404 not_found` if no webhook with that id is owned by the caller's organization; `422 validation_error` if the supplied fields are invalid (e.g. a malformed `url`); `403 forbidden` if the caller lacks the `manage` capability.
      operationId: updateWebhook
      parameters:
        - description: The webhook id to update. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
          in: path
          name: id
          required: true
          schema:
            description: The webhook id to update. Must reference a webhook owned by the caller's organization, otherwise the request fails with a 404 "not_found".
            examples:
              - 01HHX5WEBHOOK...
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Error
      summary: Update a webhook
      tags:
        - Webhooks
security:
  - bearerAuth: []
  - apiKeyHeader: []
servers:
  - description: Central router origin; operation paths include /api/v1
    url: /
tags:
  - description: Create, pair, start, stop, restart, and delete WhatsApp sessions. A session is one attached WhatsApp number.
    name: Sessions
  - description: Send text, polls, locations, and contacts. You can also edit, delete for everyone, react, forward, and vote on polls. Media sends return 501 in v1.
    name: Messages
  - description: List chats, read messages, mark chats read, update chat flags, delete chats, and set typing or recording presence.
    name: Chats
  - description: List and check contacts, read profile info, fetch profile pictures and about text, and block or unblock contacts.
    name: Contacts
  - description: List groups and members, read invites, create groups, add or remove members, promote or demote members, edit group info, join or leave groups, and approve join requests.
    name: Groups
  - description: WhatsApp channels (newsletters). All channel operations return 501 not_implemented in v1.
    name: Channels
  - description: Post text status updates and set whether the WhatsApp session is available, unavailable, typing, recording, or paused. Image status returns 501 in v1.
    name: Status & Presence
  - description: Create webhook endpoints that receive events over HTTP. Optional HMAC signing lets receivers verify the request body.
    name: Webhooks
  - description: Platform super-admin endpoints for listing all sessions and starting or checking history backfills.
    name: Admin
webhooks:
  event:
    post:
      description: The gateway sends this JSON body to each matching webhook and sends the same shape over the realtime WebSocket. Use the `event` field to choose the right payload schema. Webhooks include the event id in `X-Webhook-Request-Id`. If a secret is set, they also include `X-Webhook-Signature` so the receiver can verify the body.
      operationId: event
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                mapping:
                  auth.code: "#/components/schemas/AuthCodeEvent"
                  auth.qr: "#/components/schemas/AuthQREvent"
                  call.incoming: "#/components/schemas/CallEvent"
                  chat.update: "#/components/schemas/ChatUpdateEvent"
                  contact.update: "#/components/schemas/ContactUpdateEvent"
                  group.participant: "#/components/schemas/GroupEvent"
                  group.update: "#/components/schemas/GroupEvent"
                  message: "#/components/schemas/MessageEvent"
                  message.edited: "#/components/schemas/MessageEvent"
                  message.from_me: "#/components/schemas/MessageEvent"
                  message.reaction: "#/components/schemas/MessageEvent"
                  message.revoked: "#/components/schemas/MessageEvent"
                  message.status: "#/components/schemas/MessageStatusEvent"
                  newsletter.update: "#/components/schemas/NewsletterEvent"
                  poll.recap: "#/components/schemas/PollRecapEvent"
                  poll.vote: "#/components/schemas/MessageEvent"
                  presence.update: "#/components/schemas/PresenceEvent"
                  session.status: "#/components/schemas/SessionStatusEvent"
                propertyName: event
              oneOf:
                - $ref: "#/components/schemas/MessageEvent"
                - $ref: "#/components/schemas/PollRecapEvent"
                - $ref: "#/components/schemas/MessageStatusEvent"
                - $ref: "#/components/schemas/SessionStatusEvent"
                - $ref: "#/components/schemas/AuthQREvent"
                - $ref: "#/components/schemas/AuthCodeEvent"
                - $ref: "#/components/schemas/PresenceEvent"
                - $ref: "#/components/schemas/GroupEvent"
                - $ref: "#/components/schemas/ChatUpdateEvent"
                - $ref: "#/components/schemas/ContactUpdateEvent"
                - $ref: "#/components/schemas/CallEvent"
                - $ref: "#/components/schemas/NewsletterEvent"
        description: The event envelope. Exactly one of the listed event shapes, selected by `event`.
        required: true
      responses:
        "200":
          description: Return any 2xx to acknowledge receipt. Non-2xx (or a timeout) makes the gateway retry with backoff.
      summary: Gateway event
