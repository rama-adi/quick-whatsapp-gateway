components:
  schemas:
    AddGroupMembersInputBody:
      additionalProperties: false
      properties:
        participants:
          description: User JIDs to add.
          examples:
            - - 6281234567890@s.whatsapp.net
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    ApiError:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error. Present on every non-2xx response.
      required:
        - error
      type: object
    ApproveGroupMembersInputBody:
      additionalProperties: false
      properties:
        participants:
          description: Reserved for future implementation.
          examples:
            - - 6281234567890@s.whatsapp.net
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    AuthCodeEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - auth.code
          examples:
            - auth.code
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/AuthCodePayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    AuthCodePayload:
      additionalProperties: false
      properties:
        businessName:
          description: The account's WhatsApp Business display name, if it is a business account.
          type: string
        jid:
          description: The linked phone JID (e.g. 6281234567890@s.whatsapp.net).
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        lid:
          description: The linked-device identifier (LID) WhatsApp assigned to this device.
          type: string
        platform:
          description: The device platform WhatsApp reports (e.g. android, iphone, web).
          type: string
      type: object
    AuthQREvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - auth.qr
          examples:
            - auth.qr
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/AuthQRPayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    AuthQRPayload:
      additionalProperties: false
      properties:
        code:
          description: The QR code content to render as a QR image for the user to scan in WhatsApp → Linked devices.
          examples:
            - 2@abc123...
          type: string
      required:
        - code
      type: object
    BackfillImport:
      additionalProperties: false
      properties:
        chats:
          description: Number of chats upserted.
          examples:
            - 57
          format: int64
          type: integer
        createdAt:
          description: When the import started, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        error:
          description: Failure message when status is failed. Optional; empty otherwise.
          examples:
            - unsupported backup schema
          type: string
        finishedAt:
          description: When the import finished, in epoch milliseconds (UTC). Optional; null while still running.
          examples:
            - 1719662460000
          format: int64
          type: integer
        groupMembers:
          description: Number of group memberships upserted.
          examples:
            - 342
          format: int64
          type: integer
        groups:
          description: Number of groups upserted.
          examples:
            - 14
          format: int64
          type: integer
        id:
          description: The import job id.
          examples:
            - 01J9...
          type: string
        identities:
          description: Number of identities upserted.
          examples:
            - 310
          format: int64
          type: integer
        messages:
          description: Number of messages upserted.
          examples:
            - 12043
          format: int64
          type: integer
        organizationId:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9ABC...
          type: string
        schemaFingerprint:
          description: Detected backup schema fingerprint (WhatsApp build id + capability hash), recorded for diagnosing format drift. Optional; null when not detected.
          examples:
            - 2.24.x:ab12cd
          type: string
        sessionId:
          description: Id of the session being backfilled.
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        source:
          description: The backup source format. Currently always crypt15 (an encrypted WhatsApp chat backup).
          examples:
            - crypt15
          type: string
        status:
          description: "Current job state. **running** = import in progress; **succeeded** = completed and rows upserted; **failed** = aborted (see error). Progression: running → succeeded, or running → failed."
          enum:
            - running
            - succeeded
            - failed
          examples:
            - succeeded
          type: string
      required:
        - id
        - sessionId
        - organizationId
        - source
        - status
        - chats
        - messages
        - identities
        - groups
        - groupMembers
        - createdAt
      type: object
    BackfillJob:
      additionalProperties: false
      properties:
        contacts:
          description: Number of contacts persisted so far.
          examples:
            - 128
          format: int64
          type: integer
        error:
          description: Failure message when status is failed. Optional; empty otherwise.
          examples:
            - session not connected
          type: string
        finishedAt:
          description: When the job finished, in epoch milliseconds (UTC). Optional; null while still running.
          examples:
            - 1719662460000
          format: int64
          type: integer
        groupMembers:
          description: Number of group memberships persisted so far.
          examples:
            - 342
          format: int64
          type: integer
        groups:
          description: Number of groups persisted so far.
          examples:
            - 14
          format: int64
          type: integer
        id:
          description: The backfill job id.
          examples:
            - 01J9...
          type: string
        organizationId:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9ABC...
          type: string
        sessionId:
          description: Id of the session being backfilled.
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        startedAt:
          description: When the job started, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        status:
          description: "Current job state. **running** = in progress; **succeeded** = completed and data persisted; **failed** = aborted (see error). Progression: running → succeeded, or running → failed."
          enum:
            - running
            - succeeded
            - failed
          examples:
            - succeeded
          type: string
      required:
        - id
        - sessionId
        - organizationId
        - status
        - contacts
        - groups
        - groupMembers
        - startedAt
      type: object
    CallEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - call.incoming
          examples:
            - call.incoming
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/CallPayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    CallPayload:
      additionalProperties: false
      properties:
        callId:
          description: WhatsApp's call id.
          type: string
        from:
          description: JID of the caller.
          type: string
        groupJid:
          description: JID of the group, for a group call.
          type: string
        isGroup:
          description: True for a group call.
          type: boolean
        timestamp:
          description: When the call came in, epoch milliseconds.
          format: int64
          type: integer
      required:
        - callId
        - from
        - timestamp
        - isGroup
      type: object
    Chat:
      additionalProperties: false
      properties:
        aliases:
          description: Equivalent JIDs for this chat. For DMs this can include both the canonical LID and linked phone JID, allowing clients to merge rows observed through either address.
          examples:
            - - 205227043110953@lid
          items:
            type: string
          type:
            - array
            - "null"
        archived:
          description: Whether the chat is archived.
          examples:
            - false
          type: boolean
        id:
          description: The chat row id (internal numeric key).
          examples:
            - 3344
          format: int64
          minimum: 0
          type: integer
        jid:
          description: The chat's WhatsApp JID — its stable identifier.
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        lastMessageAt:
          description: When the most recent message in this chat arrived, in epoch milliseconds (UTC). Optional; null if the chat has no messages.
          examples:
            - 1719662400000
          format: int64
          type: integer
        mutedUntil:
          description: Muted until this time, in epoch milliseconds (UTC). Optional; null/absent when the chat is not muted.
          examples:
            - 1751198400000
          format: int64
          type: integer
        name:
          description: The chat's display name (contact name for a DM, subject for a group). Optional; null when unknown.
          examples:
            - Alice
          type: string
        pinned:
          description: Whether the chat is pinned to the top of the list.
          examples:
            - false
          type: boolean
        sessionId:
          description: Id of the session this chat belongs to.
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        type:
          description: Kind of chat. **dm** = one-to-one direct message; **group** = a group chat; **newsletter** = a WhatsApp channel; **broadcast** = a broadcast list; **status** = the status (stories) feed.
          enum:
            - dm
            - group
            - newsletter
            - broadcast
            - status
          examples:
            - dm
          type: string
        unreadCount:
          description: Number of unread messages in this chat.
          examples:
            - 3
          format: int64
          type: integer
      required:
        - id
        - sessionId
        - jid
        - type
        - unreadCount
        - archived
        - pinned
      type: object
    ChatPresenceInputBody:
      additionalProperties: false
      properties:
        state:
          description: "Presence state: composing, recording, or paused."
          enum:
            - composing
            - paused
            - recording
          examples:
            - composing
          type: string
      type: object
    ChatUpdateEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - chat.update
          examples:
            - chat.update
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/ChatUpdatePayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    ChatUpdatePayload:
      additionalProperties: false
      properties:
        change:
          description: What changed; currently picture.
          examples:
            - picture
          type: string
        chatJid:
          description: JID of the chat that changed.
          type: string
        pictureId:
          description: Id of the new profile picture, when set.
          type: string
        removed:
          description: True if the picture was removed rather than changed.
          type: boolean
      required:
        - chatJid
        - change
      type: object
    Contact:
      additionalProperties: false
      properties:
        businessName:
          description: The verified business name, for WhatsApp Business accounts. Optional; null for non-business accounts.
          examples:
            - Acme Corp
          type: string
        lid:
          description: The contact's linked-device id (LID) — WhatsApp's privacy-preserving address, used as the stable key for a contact.
          examples:
            - 205227043110953@lid
          type: string
        name:
          description: The contact's display (push) name, when known. Optional; null when unknown.
          examples:
            - Alice
          type: string
        phoneNumber:
          description: The contact's phone number in plain digits, when known. Optional; null when only the LID is known.
          examples:
            - "6281234567890"
          type: string
        source:
          description: Where this session encountered the contact. **dm** = a direct chat with them exists; **group** = they were seen in a group this session is in.
          enum:
            - dm
            - group
          examples:
            - dm
          type: string
      required:
        - lid
        - source
      type: object
    ContactAboutOutputBody:
      additionalProperties: false
      properties:
        about:
          type: string
      required:
        - about
      type: object
    ContactCard:
      additionalProperties: false
      properties:
        name:
          description: The shared contact's display name. Used to build a vCard when vcard is not supplied. Optional.
          examples:
            - Alice
          type: string
        phone:
          description: The shared contact's phone number in plain digits. Used to build a vCard when vcard is not supplied. Optional.
          examples:
            - "6281234567890"
          type: string
        vcard:
          description: A full vCard string. If set, it is sent verbatim instead of building one from name/phone. Optional.
          examples:
            - |-
              BEGIN:VCARD
              VERSION:3.0
              FN:Alice
              TEL:+6281234567890
              END:VCARD
          type: string
      type: object
    ContactData:
      additionalProperties: false
      properties:
        displayName:
          description: The contact's display name.
          type: string
        vcard:
          description: The raw vCard for the shared contact.
          type: string
      type: object
    ContactDetail:
      additionalProperties: false
      properties:
        dm:
          type: boolean
        groups:
          items:
            $ref: "#/components/schemas/ContactGroup"
          type:
            - array
            - "null"
        identity:
          $ref: "#/components/schemas/Identity"
      required:
        - dm
        - groups
      type: object
    ContactGroup:
      additionalProperties: false
      properties:
        jid:
          type: string
        lastSeen:
          format: int64
          type: integer
        name:
          type: string
        role:
          type: string
        tag:
          type: string
      required:
        - jid
        - role
        - lastSeen
      type: object
    ContactUpdateEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - contact.update
          examples:
            - contact.update
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/ContactUpdatePayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    ContactUpdatePayload:
      additionalProperties: false
      properties:
        firstName:
          description: The first name from the address book, when known.
          type: string
        fullName:
          description: The full name from the address book, when known.
          type: string
        jid:
          description: JID of the contact that changed.
          type: string
        pushName:
          description: The contact's current WhatsApp display (push) name.
          type: string
      required:
        - jid
      type: object
    CreateChannelInputBody:
      additionalProperties: false
      properties:
        description:
          description: Optional channel description.
          examples:
            - Product updates and release notes.
          type: string
        name:
          description: Channel name. Optional in payload; empty or invalid names are rejected as validation_error (400).
          examples:
            - Acme Announcements
          type: string
      type: object
    CreateChannelOutputBody:
      additionalProperties: false
      properties:
        jid:
          type: string
      required:
        - jid
      type: object
    CreateGroupInputBody:
      additionalProperties: false
      properties:
        name:
          description: Group subject. Required.
          examples:
            - Engineering Team
          type: string
        participants:
          description: Initial member JIDs.
          examples:
            - - 6281234567890@s.whatsapp.net
              - 6289876543210@s.whatsapp.net
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    CreateSessionInputBody:
      additionalProperties: false
      properties:
        autoRead:
          description: If true, mark incoming messages as read automatically.
          examples:
            - false
          type: boolean
        label:
          description: Optional human-friendly session label.
          examples:
            - Sales line
          type: string
        presenceTyping:
          description: If true, send typing indicator while a message is sent from this session.
          examples:
            - true
          type: boolean
        start:
          description: If true, begin QR pairing immediately. If false, create the session in stopped/unpaired state and pair later.
          examples:
            - true
          type: boolean
      type: object
    EditMessageInputBody:
      additionalProperties: false
      properties:
        chat:
          description: Chat JID for the message.
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        text:
          description: New text content. Only text messages are supported.
          examples:
            - Updated message text
          type: string
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        code:
          description: "Stable, machine-readable error code. Branch on this, not on the HTTP status or the message text — the message may change wording, the code will not. Codes map to HTTP statuses: not_found→404, unauthorized→401, forbidden→403, validation_error→400, conflict→409, rate_limited→429, not_implemented→501, gateway_unavailable→503 (the owning gateway is draining or unreachable; retry), internal→500."
          enum:
            - rate_limited
            - not_found
            - unauthorized
            - forbidden
            - validation_error
            - conflict
            - not_implemented
            - gateway_unavailable
            - internal
          examples:
            - not_found
          type: string
        details:
          additionalProperties: {}
          description: Optional structured context. For validation_error this carries an "errors" array of field-level messages; absent when there is nothing to add.
          type: object
        message:
          description: Human-readable explanation of what went wrong, for logs and developers. Not localized and not meant to be shown verbatim to end users.
          examples:
            - session not found
          type: string
      required:
        - code
        - message
      type: object
    FormFile:
      additionalProperties: false
      properties:
        ContentType:
          type: string
        Filename:
          type: string
        IsSet:
          type: boolean
        Size:
          format: int64
          type: integer
      required:
        - ContentType
        - IsSet
        - Size
        - Filename
      type: object
    ForwardInputBody:
      additionalProperties: false
      properties:
        chat:
          description: Source chat JID.
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        sender:
          description: Original sender JID. Empty means your own message.
          examples:
            - ""
          type: string
        to:
          description: Destination chat JID.
          examples:
            - 6289876543210@s.whatsapp.net
          type: string
      type: object
    Group:
      additionalProperties: false
      properties:
        createdAtWa:
          description: When the group was created on WhatsApp, in epoch milliseconds (UTC). Optional; null when unknown.
          examples:
            - 1700000000000
          format: int64
          type: integer
        description:
          description: The group's description text. Optional; null when unset.
          examples:
            - Coordination for Q3 launch
          type: string
        firstSeenAt:
          description: When this group was first observed by the gateway, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        groupJid:
          description: The group's WhatsApp JID — its stable identifier.
          examples:
            - 120363021234567890@g.us
          type: string
        id:
          description: The group row id (internal numeric key).
          examples:
            - 512
          format: int64
          minimum: 0
          type: integer
        isAnnounce:
          description: If true, only admins can post (announcement group). Optional; null when unknown.
          examples:
            - false
          type: boolean
        isLocked:
          description: If true, only admins can edit the group's info (name, description, icon). Optional; null when unknown.
          examples:
            - false
          type: boolean
        ownerJid:
          description: JID of the group's owner/creator. Optional; null when unknown.
          examples:
            - 6281234567890@s.whatsapp.net
          type: string
        participantCount:
          description: Number of members in the group. Optional; null when not yet known.
          examples:
            - 42
          format: int64
          type: integer
        subject:
          description: The group's name (its subject). Optional; null when unknown.
          examples:
            - Project Team
          type: string
        updatedAt:
          description: When this group's record was last updated, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
      required:
        - id
        - groupJid
        - firstSeenAt
        - updatedAt
      type: object
    GroupEvent:
      additionalProperties: false
      properties:
        event:
          enum:
            - group.update
            - group.participant
          examples:
            - group.update
          type: string
        id:
          description: Unique event id. Webhook deliveries repeat it in the X-Webhook-Request-Id header so receivers can drop duplicate redeliveries; the realtime client uses it as the ?since resume cursor.
          examples:
            - evt_01J9ZX...
          type: string
        organization:
          description: Id of the organization that owns the session.
          examples:
            - org_01J9...
          type: string
        payload:
          $ref: "#/components/schemas/GroupPayload"
        schema:
          description: Envelope schema version, so consumers can adapt if the shape changes.
          enum:
            - v1
          examples:
            - v1
          type: string
        session:
          description: Id of the WhatsApp session the event came from.
          examples:
            - wa_sess_01J9...
          type: string
        timestamp:
          description: When the event happened, in epoch milliseconds.
          examples:
            - 1719400000000
          format: int64
          type: integer
      required:
        - event
        - payload
        - schema
        - id
        - session
        - organization
        - timestamp
      type: object
    GroupInfo:
      additionalProperties: false
      properties:
        description:
          type: string
        groupJid:
          type: string
        isAnnounce:
          type: boolean
        isLocked:
          type: boolean
        ownerJid:
          type: string
        participants:
          format: int64
          type: integer
        subject:
          type: string
      required:
        - groupJid
      type: object
    GroupMember:
      additionalProperties: false
      properties:
        firstSeenAt:
          description: When this membership was first observed, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        groupJid:
          description: JID of the group this membership is in.
          examples:
            - 120363021234567890@g.us
          type: string
        id:
          description: The membership pivot-row id (internal numeric key).
          examples:
            - 7781
          format: int64
          minimum: 0
          type: integer
        lastSeenAt:
          description: When this member was last seen in the group, in epoch milliseconds (UTC).
          examples:
            - 1719662400000
          format: int64
          type: integer
        lid:
          description: The member's LID (canonical, the identity key).
          examples:
            - 205227043110953@lid
          type: string
        role:
          description: The member's role in the group. **member** = ordinary participant; **admin** = group admin (can manage members and settings); **superadmin** = the group creator/owner.
          enum:
            - member
            - admin
            - superadmin
          examples:
            - member
          type: string
        sessionId:
          description: Id of the session that observed this membership.
          examples:
            - 01J9ZX8K2QHV0M3T6R7P4N5W8C
          type: string
        tag:
          description: The per-group member tag WhatsApp shows beside the name — a second, group-specific identity (often the obfuscated phone for anonymous members), distinct from the global push name. Optional; null when absent.
          examples:
            - ~Alice
          type: string
