version: "2"
sql:
  - engine: "mysql"
    schema:
      - "migrations/0001_init.up.sql"
      - "migrations/0002_identity_redesign.up.sql"
      - "migrations/0003_backfill_imports.up.sql"
      - "migrations/0004_gateways_lifecycle.up.sql"
      - "migrations/0005_polls.up.sql"
      - "internal/store/sqlc_schema/auth.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "storedb"
        out: "internal/store/storedb"
        sql_package: "database/sql"
        emit_empty_slices: true
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_json_tags: true
        emit_db_tags: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        query_parameter_limit: 0
        overrides:
          - column: "webhooks.hmac_secret"
            go_type:
              type: "byte"
              slice: true
