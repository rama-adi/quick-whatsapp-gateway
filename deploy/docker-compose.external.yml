# Production / split hosting: bring-your-own MySQL + Redis; only app images run
# here. The router is the single public API front door. Gateways stay internal
# and register themselves in MySQL for placement/routing.
#
#   docker compose -f deploy/docker-compose.external.yml up -d
services:
  router:
    image: ghcr.io/you/whatsmeow-router:latest
    ports: ["8090:8090"]
    environment:
      ROUTER_HTTP_ADDR: "${ROUTER_HTTP_ADDR:-:8090}"
      ROUTER_PUBLIC_URL: "${ROUTER_PUBLIC_URL}"
      ROUTER_ISSUER: "${ROUTER_ISSUER:-router}"
      ROUTER_ED25519_PRIVATE_KEY: "${ROUTER_ED25519_PRIVATE_KEY}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL}"
      BETTER_AUTH_JWKS_URL: "${BETTER_AUTH_JWKS_URL:-}"
      FRONTEND_ORIGINS: "${FRONTEND_ORIGINS}"
      MYSQL_DSN: "${MYSQL_DSN}"
      REDIS_URL: "${REDIS_URL}"
      PUBSUB_REDIS_URL: "${PUBSUB_REDIS_URL:-}"
      REDIS_PREFIX: "${REDIS_PREFIX:-gw}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"

  gateway:
    image: ghcr.io/you/whatsmeow-gateway:latest
    expose: ["8080"]
    environment:
      HTTP_ADDR: ":8080"
      GATEWAY_ID: "${GATEWAY_ID:-gw-1}"
      # Internal URL reachable by the router, not by browsers or API clients.
      PUBLIC_URL: "${PUBLIC_URL}"
      ROUTER_JWKS_URL: "${ROUTER_JWKS_URL}"
      ROUTER_ASSERTION_ISSUER: "${ROUTER_ASSERTION_ISSUER:-router}"
      APP_ENCRYPTION_KEY: "${APP_ENCRYPTION_KEY}"
      MYSQL_DSN: "${MYSQL_DSN}"
      WHATSMEOW_STORE_DSN: "${WHATSMEOW_STORE_DSN:-file:/data/keystore/store.db?_pragma=foreign_keys(on)&_pragma=journal_mode(WAL)}"
      REDIS_URL: "${REDIS_URL}"
      REDIS_PREFIX: "${REDIS_PREFIX:-gw}"
      WHATSAPP_ADMIN_NUMBER: "${WHATSAPP_ADMIN_NUMBER:-}"
      WHATSAPP_ADMIN_ORG_ID: "${WHATSAPP_ADMIN_ORG_ID:-}"
      WHATSAPP_ADMIN_CMD_PREFIX: "${WHATSAPP_ADMIN_CMD_PREFIX:-am}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes: ["keystore_data:/data/keystore"]

  frontend:
    image: ghcr.io/you/whatsmeow-gateway-web:latest
    ports: ["3000:3000"]
    environment:
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL}"
      DATABASE_URL: "${DATABASE_URL}"
      GATEWAY_URL: "${GATEWAY_URL}"
      VITE_GATEWAY_URL: "${VITE_GATEWAY_URL:-${GATEWAY_URL}}"
      PUBSUB_REDIS_URL: "${PUBSUB_REDIS_URL}"
      USER_REGISTRATION_ENABLED: "${USER_REGISTRATION_ENABLED:-true}"
      ADMIN_USER_IDS: "${ADMIN_USER_IDS:-}"
volumes: { keystore_data: {} }
